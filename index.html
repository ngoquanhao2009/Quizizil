<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trắc Nghiệm Đề Cương | by ngoquanhao2009</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background-image:
        linear-gradient(120deg, rgba(2, 6, 23, 0.65), rgba(15, 23, 42, 0.55)),
        url("Thiết kế chưa có tên.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
      padding: 16px;
      box-sizing: border-box;
    }

    .page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .petal-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .petal {
      position: absolute;
      top: -12vh;
      left: var(--x, 50vw);
      font-size: var(--size, 18px);
      opacity: 0.72;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.25));
      animation: petalFall var(--duration, 18s) linear infinite;
      animation-delay: var(--delay, 0s);
      will-change: transform;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.45);
    }

    .main-title {
      margin: 0;
      text-align: left;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(90deg, #8b5cf6, #22d3ee, #8b5cf6);
      background-size: 200%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shine 6s linear infinite;
      text-shadow: 0 0 18px rgba(34, 211, 238, 0.2);
    }

    .main-title span {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 4px;
      background: none;
      background-clip: border-box;
      -webkit-background-clip: border-box;
    }

    .container {
      width: min(92vw, 560px);
      backdrop-filter: blur(15px);
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.25), 0 15px 40px rgba(0, 0, 0, 0.35);
      transition: 0.3s;
      position: relative;
    }

    .music-btn {
      margin-top: 6px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      background: #334155;
      color: #e2e8f0;
    }

    input,
    select,
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 15px;
    }

    input,
    select {
      width: min(80%, 320px);
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      pointer-events: auto;
      z-index: 10;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .answer {
      width: 100%;
      margin: 8px 0;
      background: #3498db;
      color: white;
      transition: 0.2s;
    }

    .answer:hover {
      transform: scale(1.02);
    }

    .answer.selected {
      background: #7c3aed;
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.45) inset;
    }

    .correct {
      background: #16a34a !important;
      color: white;
      transform: scale(1.03);
    }

    .wrong {
      background: #dc2626 !important;
      color: white;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      gap: 10px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      background: #2ecc71;
      width: 0;
      transition: 0.4s;
    }

    #question {
      white-space: pre-line;
      text-align: left;
      line-height: 1.45;
    }

    .quiz-layout {
      display: block;
    }

    .question-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      margin: 8px 0 10px;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .flash {
      box-shadow: 0 0 0 9999px rgba(231, 76, 60, 0.2) inset;
    }

    .fade-in {
      animation: fadeIn 0.5s ease;
    }

    @keyframes petalFall {
      0% {
        transform: translate3d(0, -10vh, 0) rotate(0deg);
      }
      30% {
        transform: translate3d(calc(var(--drift, 8vw) * 0.4), 30vh, 0) rotate(110deg);
      }
      60% {
        transform: translate3d(calc(var(--drift, 8vw) * -0.2), 65vh, 0) rotate(220deg);
      }
      100% {
        transform: translate3d(var(--drift, 8vw), 115vh, 0) rotate(360deg);
      }
    }

    @keyframes shine {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.4s;
    }

    ol {
      text-align: left;
      margin: 0 auto;
      max-width: 320px;
      padding-left: 24px;
    }

    li {
      margin: 6px 0;
    }

    .meta {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 8px;
    }

    .answer-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }

    .answer-box.show {
      display: block;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .review-btn {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .review-block {
      margin: 12px 0;
      padding: 12px;
      background: #0f172a;
      border-radius: 10px;
      text-align: left;
    }

    .review-block p {
      margin: 6px 0;
    }

    .stat-box {
      margin-top: 16px;
      padding: 15px;
      border-radius: 12px;
      background: #0f172a;
      text-align: left;
    }

    .progress-stat {
      height: 15px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    #reviewPanel {
      margin-top: 12px;
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
      text-align: left;
    }

    .footer-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      justify-content: center;
    }

    .visitor-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(34, 211, 238, 0.25);
      padding: 8px 14px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.15);
    }

    .fox-container {
      position: relative;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .fox {
      font-size: 28px;
      animation: foxFloat 4s ease-in-out infinite;
      transform-origin: center;
      will-change: transform;
    }

    @keyframes foxFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .counter-display {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      white-space: nowrap;
    }

    .counter-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .counter-value {
      font-size: 18px;
      color: #22d3ee;
      display: inline-block;
      min-width: 35px;
      text-align: right;
      font-weight: 800;
    }

    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }

      .footer-container {
        flex-direction: column;
        gap: 10px;
      }

      input,
      select {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .petal {
        animation: none;
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="petal-layer" id="petalLayer" aria-hidden="true"></div>
  <div class="page">
    <div class="brand">
      <img src="logo.png" alt="Logo Trắc Nghiệm Đề Cương" class="brand-logo" />
      <h1 class="main-title">
        Trắc Nghiệm Đề Cương
        <span>by ngoquanhao2009</span>
      </h1>
    </div>

    <div class="container" id="container">
      <div id="start">
        <h2>🎯 Quizizi Elite</h2>
        <p class="meta">trên bước đường thành công sẽ có dấu xe của kẻ lười biếng</p>
        <input id="name" placeholder="Nhập tên" />
        <br />
        <select id="subject">
          <option value="">-- Chọn môn học --</option>
          <option value="sucuoikihei">TRẮC NGHIỆM SỬ CUỐI KÌ HEI</option>
        </select>
        <br />
        <button id="startBtn">Bắt đầu</button>
      </div>

      <div id="quiz" class="hidden">
        <div class="topbar">
          <span>⏳ <span id="time">05:00</span></span>
          <span>⭐ <span id="score">0</span></span>
          <span>🧩 <span id="position">1</span>/<span id="total">28</span></span>
        </div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <p class="meta" id="progressText">Đang ở câu 1/28</p>
        <div id="quizLayout" class="quiz-layout">
          <div class="question-pane">
            <h3 id="question"></h3>
            <img id="questionImage" class="question-image hidden" alt="Hình minh họa câu hỏi" />
            <div id="answers"></div>
            <input id="shortAnswerInput" type="text" placeholder="Nhập câu trả lời..." class="hidden" />
            <button id="submitBtn">Nộp đáp án</button>
            <div id="answerBox" class="answer-box"></div>
          </div>
        </div>
      </div>

      <div id="result" class="hidden">
        <h2>🏆 Hoàn thành</h2>
        <p id="final"></p>
        <div id="statsBox" class="stat-box hidden"></div>
        <h3>Top 5</h3>
        <ol id="rank"></ol>
        <button id="reviewBtn" class="review-btn hidden">Xem lại câu sai</button>
        <div id="reviewPanel" class="hidden"></div>
        <button id="restartBtn">Chơi lại</button>
      </div>
    </div>
    <div class="footer-container">
      <div class="visitor-counter">
        <div class="fox-container">
          <div class="fox">🦊</div>
        </div>
        <div class="counter-display">
          <span class="counter-label">👥 Lượt thăm:</span>
          <span class="counter-value" id="visitorCount">0</span>
        </div>
      </div>
      <button id="musicBtn" class="music-btn" type="button">🎵 Bật nhạc</button>
    </div>

  <audio id="soundCorrect" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>
  <audio id="soundWrong" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <audio id="bgMusic" src="videoplayback (1).m4a" loop preload="auto"></audio>

  <script>
    // Visitor Counter - Simple & Optimized
    const VISITOR_KEY = "quizVisitorCount";
    
    function initializeVisitorCounter() {
      let count = parseInt(localStorage.getItem(VISITOR_KEY)) || 0;
      count++;
      localStorage.setItem(VISITOR_KEY, count);
      
      const counterElement = document.getElementById("visitorCount");
      if (counterElement) {
        counterElement.textContent = count;
      }
    }

    function initPetals() {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }
      const layer = document.getElementById("petalLayer");
      if (!layer) {
        return;
      }

      const totalPetals = window.innerWidth <= 640 ? 8 : 12;
      const frag = document.createDocumentFragment();

      for (let i = 0; i < totalPetals; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.textContent = "🌸";
        petal.style.setProperty("--x", `${Math.random() * 100}vw`);
        petal.style.setProperty("--drift", `${(Math.random() * 18 - 9).toFixed(2)}vw`);
        petal.style.setProperty("--size", `${14 + Math.random() * 10}px`);
        petal.style.setProperty("--duration", `${14 + Math.random() * 10}s`);
        petal.style.setProperty("--delay", `${(-Math.random() * 20).toFixed(2)}s`);
        frag.appendChild(petal);
      }

      layer.appendChild(frag);
    }
    
    window.addEventListener("load", initializeVisitorCounter);
    window.addEventListener("load", initPetals);

    const historyFinalHeiQuestionBank = [
      { q: "Câu 1. Nội dung nào sau đây phản ảnh đúng mục đích cải cách của vua Lê Thánh Tông?", a: ["Tăng cường quyền lực của hoàng đế và củng cố bộ máy nhà nước", "Giải quyết tình trạng khủng hoảng trầm trọng của đất nước bấy giờ", "Biến nước ta trở thành cường quốc lớn mạnh hàng đầu trong khu vực.", "Tăng cường tiềm lực đất nước chuẩn bị đối phó với giặc ngoại xâm"], c: 0 },
      { q: "Câu 2. “Coi trọng biên soạn quốc sử” là nội dung cải cách của vua Lê Thánh Tông trên lĩnh vực nào sau đây?", a: ["Quân đội", "Văn hóa", "Luật pháp", "Kinh tế"], c: 1 },
      { q: "Câu 3. Một trong những đặc điểm cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) là", a: ["mang tính cưỡng bức, nặng về mô phỏng bên ngoài", "chủ yếu diễn ra trên lĩnh vực chính trị, hành chính", "ảnh hưởng trực tiếp đến khối đại đoàn kết dân tộc", "không tạo điều kiện cho sự phát triển kinh tế đất nước"], c: 1 },
      { q: "Câu 4. Cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) được thực hiện trong bối cảnh", a: ["tình hình an ninh - xã hội ở nhiều địa phương bất ổn", "bộ máy nhà nước phong kiến cơ bản đã hoàn chỉnh.", "tình trạng phân quyền, thiếu thống nhất đã khắc phục.", "phương thức sản xuất tư bản chủ nghĩa thâm nhập mạnh"], c: 0 },
      { q: "Câu 5. Quốc gia đầu tiên khai phá, xác lập chủ quyền và quản lý liên tục đối với quần đảo Trường Sa và Hoàng Sa là", a: ["Việt Nam", "Trung Quốc", "Thái Lan", "Campuchia"], c: 0 },
      { q: "Câu 6. Nội dung nào sau đây phản ánh đúng tầm quan trọng của Biển Đông về quốc phòng, an ninh đối với Việt Nam?", a: ["Tạo điều kiện thuận lợi phát triển kinh tế biển đa dạng", "Là cửa ngõ, tuyến phòng thủ bảo vệ đất liền từ xa.", "Là con đường giao thương giữa các vùng trong cả nước.", "Tạo thuận lợi cho Việt Nam phát triển thương mại hàng hải"], c: 1 },
      { q: "Câu 7. Về quốc phòng, an ninh, tầm quan trọng của Biển Đông đối với Việt Nam được thể hiện ở điểm nào sau đây?", a: ["Là nơi có trữ lượng dầu khí lớn nhất thế giới.", "Là nơi có nguồn tài nguyên sinh vật đa dạng.", "Là khu vực tập trung các tuyến đường chiến lược.", "Là tuyến phòng thủ từ phía đông của đất nước."], c: 3 },
      { q: "Câu 8. Từ thế kỉ XVII đến thế kỉ XIX, tổ chức nào sau đây có nhiệm vụ đến khai thác sản vật, thực thi chủ quyền tại quần đảo Hoàng Sa và Trường Sa?", a: ["Đội Hoàng Sa, Bắc Hải", "Đội Trường Sa, Bắc Hải", "Đội Hoàng Sa, Trường Sa", "Đội Nam Hải, Đông Hải"], c: 0 },
      { q: "Câu 9. Biển Đông là vùng biển thuộc", a: ["Ấn Độ Dương", "Thái Bình Dương", "Đại Tây Dương", "Địa Trung Hải"], c: 1 },
      { q: "Câu 10. Ở Biển Đông, nguồn tài nguyên thiên nhiên nào sau đây có trữ lượng vào loại lớn nhất thế giới?", a: ["Muối biển", "Băng cháy", "Dầu khí", "Quặng sắt"], c: 2 },
      { q: "Câu 11. Nội dung nào sau đây thể hiện tầm quan trọng chiến lược của Biển Đông?", a: ["Là tuyến hàng hải quốc tế nhộn nhịp nhất trên thế giới.", "Là tuyến hàng hải nối Thái Bình Dương với Bắc Băng Dương", "Có nhiều tài nguyên thiên nhiên biển phong phú.", "Là tuyến giao thông hàng hải duy nhất trên biển."], c: 2 },
      { q: "Câu 12. Hiện nay, quần đảo Trường Sa trực thuộc quyền quản lí hành chính của", a: ["thành phố Đà Nẵng", "tỉnh Kiên Giang", "tỉnh Khánh Hòa", "tỉnh Nghệ An"], c: 2 },
      { q: "Câu 13. Các cảng biển lớn trên Biển Đông có vai trò như thế nào?", a: ["Điểm trung chuyển của tàu thuyền", "Nơi giao lưu kinh tế, văn hóa", "Điểm tập trung phát triển du lịch", "Nơi giải quyết các vấn đề xã hội"], c: 0 },
      { q: "Câu 14. Quần đảo Hoàng Sa và quần đảo Trường Sa thuộc chủ quyền của Việt Nam nằm ở trung tâm của Biển Đông có vị trí chiến lược quan trọng như thế nào?", a: ["Nằm trên những tuyến đường hàng hải quốc tế quan trọng.", "Điểm trung chuyển, trao đổi và bốc dỡ hàng hóa nội địa.", "Điểm điều tiết giao thông đường biển quan trọng bậc nhất châu Âu.", "Tuyến đường di chuyển ngắn nhất nối Thái Bình Dương và Đại Tây Dương."], c: 0 },
      { q: "Câu 15. Các đảo và quần đảo đóng vai trò quan trọng như thế nào đối với Biển Đông?", a: ["Nơi tập trung các mô hình chính trị, kinh tế xã hội và văn hóa đa dạng.", "Vị trí phòng thủ chiến lược trọng yếu đối với nhiều quốc gia trong khu vực.", "Điểm điều tiết giao thông đường biển quan trọng bậc nhất châu Âu.", "Cung cấp nguồn tài nguyên thiên nhiên phong phú với trữ lượng lớn."], c: 1 },
      { q: "Câu 16. Hiện nay, Việt Nam vận dụng nguyên tắc cơ bản nào của Liên hợp quốc để đấu tranh bảo vệ chủ quyền biển đảo?", a: ["Bình đẳng chủ quyền và quyền tự quyết của các dân tộc.", "Không can thiệp vào công việc nội bộ của bất kỳ nước nào.", "Giải quyết các tranh chấp quốc tế bằng biện pháp hòa bình.", "Tôn trọng toàn vẹn lãnh thổ và độc lập chính trị của các nước."], c: 2 },
      { q: "Câu 17. Để thực thi chủ quyền của nhà nước Đại Việt đối với Hoàng Sa - Trường Sa, chúa Nguyễn Phúc Nguyên đã cho thành lập những hải đội nào?", a: ["Hải đội Hoàng Sa và Trường Sa", "Hải đội Hoàng Sa và Bắc Hải", "Hải đội Tư Nghĩa và Bắc Hải", "Hải đội Trường Sa và Côn Lôn"], c: 1 },
      { q: "Câu 18. Để khẳng định chủ quyền biển, đảo Việt Nam, văn bản pháp luật nào sau đây có vai trò đặc biệt quan trọng?", a: ["Hiến pháp", "Luật Biển Việt Nam", "Công ước Liên hợp quốc về Luật Biển", "Luật Dân quân tự vệ"], c: 1 },
      { q: "Câu 19. Tuyên bố về ứng xử của các bên ở Biển Đông (DOC) được kí kết bởi", a: ["ASEAN và Hàn Quốc", "ASEAN và Mĩ", "ASEAN và Trung Quốc", "ASEAN và Nhật Bản"], c: 2 },
      { q: "Câu 20. Việt Nam thực thi chủ quyền đối với hai quần đảo Hoàng Sa và Trường Sa dưới thời các chúa Nguyễn có ý nghĩa như thế nào?", a: ["Tạo cơ sở lịch sử cho cuộc đấu tranh bảo vệ chủ quyền biển đảo hiện nay.", "Khẳng định và bảo vệ chủ quyền của các đảo, quần đảo thuộc Vịnh Bắc Bộ.", "Đảm bảo cho hoạt động khai thác lâu dài của người Việt ở Vịnh Bắc Bộ.", "Khẳng định chủ quyền và hoạt động khai thác lâu dài tại vùng vịnh Thái Lan"], c: 0 },
      { q: "Câu 21. “Một thước núi, một tấc sông của ta lẽ nào lại vứt bỏ... Kẻ nào dám đem một tấc đất của Thái Tổ làm mồi cho giặc thì tội phải tru di”. Lời căn dặn trên của vua Lê Thái Tông phản ánh điều gì?", a: ["Ý thức về việc bảo vệ chủ quyền quốc gia dân tộc.", "Sách lược ngoại giao của nhà Lê đối với Trung Hoa.", "Chính sách đoàn kết để bảo vệ chủ quyền dân tộc.", "Chính sách Nam tiến của nhà Lê."], c: 0 },
      { q: "Câu 22. Cuộc cải cách hành chính của vua Lê Thánh Tông không mang ý nghĩa nào đối với tình hình Đại Việt?", a: ["Hoàn thiện bộ máy nhà nước phong kiến quân chủ.", "Đưa chế độ phong kiến phát triển lên đỉnh cao.", "Ổn định chính trị để phát triển kinh tế, văn hóa.", "Thúc đẩy quá trình khai hoang và mở rộng lãnh thổ."], c: 3 },
      { q: "Câu 23. Cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) có ý nghĩa quan trọng nào sau đây?", a: ["xóa bỏ tình trạng “bế quan tỏa cảng” của đất nước.", "ngăn chặn mọi nguy cơ xâm lược từ bên ngoài.", "đặt cơ sở cho sự phân chia tỉnh, huyện hiện nay.", "hoàn thành thống nhất đất nước về mặt lãnh thổ."], c: 2 },
      { q: "Câu 24. Một trong những di sản lớn nhất trong cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) còn giá trị đến ngày nay là", a: ["cách thức tổ chức bộ máy nhà nước ở trung ương.", "cách thức phân chia đơn vị hành chính cấp tỉnh.", "chú trọng phát triển kinh tế theo hướng hiện đại.", "ưu tiên bổ nhiệm quan lại là người ở địa phương."], c: 1 },
      { q: "Câu 25. Cuộc cải cách của vua Lê Thánh Tông được tiến hành trong bối cảnh lịch sử nào sau đây?", a: ["Nội bộ triều đình có nhiều mâu thuẫn, biến động.", "Nền kinh tế sa sút, nạn đói diễn ra thường xuyên", "Đất nước đứng trước nguy cơ bị nhà Minh xâm lược", "Chế độ phong kiến lâm vào khủng hoảng trầm trọng"], c: 0 },
      { q: "Câu 26. Công cuộc cải cách của Lê Thánh Tông được tiến hành trên mọi lĩnh vực, nhưng tập trung chủ yếu vào lĩnh vực", a: ["kinh tế", "giáo dục", "hành chính", "văn hóa"], c: 2 },
      { q: "Câu 27. Để quản lý đất nước, vua Lê Thánh Tông đã cho ban hành bộ luật nào sau đây?", a: ["Hình thư", "Quốc triều hình luật", "Hình luật", "Hoàng Việt luật lệ"], c: 1 },
      { q: "Câu 28. Trong lĩnh vực văn hóa, Lê Thánh Tông đặc biệt đề cao hệ tư tưởng", a: ["Phật giáo", "Đạo giáo", "Nho giáo", "Thiên chúa giáo"], c: 2 },
      { q: "Câu 29. Ban cấp ruộng đất ruộng đất cho quý tộc, quan lại cao cấp từ nhất phẩm đến tứ phẩm là nội dung chủ yếu của chính sách cải cách nào sau đây của vua Lê Thánh Tông?", a: ["Quân điền", "Hạn điền", "Hạn nô", "Lộc điền"], c: 3 },
      { q: "Câu 30. Công cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) đã đem lại một trong những kết quả nào sau đây?", a: ["Đưa đất nước phát triển lên chế độ tư bản chủ nghĩa.", "Thúc đẩy bộ máy chính quyền các cấp hoạt động hiệu quả.", "Góp phần mở cửa và hội nhập nền kinh tế khu vực.", "Hoàn thành thống nhất đất nước về mặt lãnh thổ."], c: 1 },
      { q: "Câu 31. Nội dung nào sau đây không phản ánh đúng kết quả cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX)?", a: ["Xây dựng được chế độ quân chủ trung ương tập quyền cao độ.", "Thống nhất đơn vị hành chính địa phương trong cả nước.", "Tổ chức cơ cấu bộ máy nhà nước gọn nhẹ, chặt chẽ.", "Xây dựng chế độ quân chủ trung ương phân quyền cao độ."], c: 3 },
      { q: "Câu 32. Trong bộ máy chính quyền trung ương thời Minh Mạng, Cơ mật viện có vai trò tư vấn cho nhà vua về", a: ["văn hóa", "quân sự", "giáo dục", "luật pháp"], c: 1 },
      { q: "Câu 33. Ở địa phương, trong công cuộc cải cách hành chính nửa đầu thế kỉ XIX, vua Minh Mạng đã chia cả nước thành", a: ["30 tỉnh và 1 phủ Thừa Thiên", "Bắc Thành, Gia Định thành", "13 đạo thừa tuyên và các phủ", "các lộ, trấn, phủ, huyện/châu"], c: 0 },
      { q: "Câu 34. Cuộc cải cách của vua Minh Mạng (nửa đầu thế kỉ XIX) được thực hiện trong bối cảnh", a: ["tình hình an ninh - xã hội ở nhiều địa phương bất ổn", "bộ máy nhà nước phong kiến cơ bản đã hoàn chỉnh.", "tình trạng phân quyền, thiếu thống nhất đã khắc phục.", "phương thức sản xuất tư bản chủ nghĩa thâm nhập mạnh"], c: 0 },
      { q: "Câu 35. Một trong những nguồn tài nguyên quan trọng nhất ở thềm lục địa Việt Nam ở Biển Đông là", a: ["dầu khí", "gỗ lim", "cánh kiến", "đồi mồi"], c: 0 },
      { q: "Câu 36. Nguồn tài nguyên phong phú của Biển Đông đã tạo điều kiện thuận lợi để Việt Nam phát triển ngành", a: ["dệt may", "khai khoáng", "hàng không", "da giầy"], c: 1 },
      { q: "Câu 37. Quốc gia đầu tiên khai phá, xác lập chủ quyền và quản lý liên tục đối với quần đảo Trường Sa và Hoàng Sa là", a: ["Việt Nam", "Trung Quốc", "Thái Lan", "Campuchia"], c: 0 },
      { q: "Câu 38. Một trong những công trình sử học và địa lí ghi chép về cương vực, lãnh thổ và hoạt động thực thi, bảo vệ chủ quyền của nhà nước phong kiến Việt Nam ở quần đảo Hoàng Sa, quần đảo Trường Sa là", a: ["Đại Nam thực lục", "Hịch tướng sĩ", "Bình Ngô đại cáo", "Ức Trai thi tập"], c: 0 },
      { q: "Câu 39. Từ thế kỉ XVII đến thế kỉ XIX, tổ chức nào sau đây có nhiệm vụ đến khai thác sản vật, thực thi chủ quyền tại quần đảo Hoàng Sa và Trường Sa?", a: ["Đội Hoàng Sa, Bắc Hải", "Đội Trường Sa, Bắc Hải", "Đội Hoàng Sa, Trường Sa", "Đội Nam Hải, Đông Hải"], c: 0 },
      { q: "Câu 40. Dưới thời vua Minh Mạng, hoạt động khẳng định chủ quyền đối với quần đảo Hoàng Sa và Trường Sa được thể hiện qua việc", a: ["thành lập các xã đảo, huyện đảo", "dựng miếu, trồng cây ở một số đảo", "xây dựng các trạm khí tượng lớn", "xây dựng các trạm vô tuyến điện"], c: 1 },
      { q: "Câu 41. Dưới thời kì nhà Nguyễn, một trong những biện pháp của Nhà nước nhằm xác lập chủ quyền và quản lý đối với hai quần đảo Hoàng Sa và Trường Sa là", a: ["xây dựng trạm vô tuyến điện", "khảo sát đo vẽ bản đồ", "thành lập các huyện đảo", "xây dựng ngọn hải đăng"], c: 1 },
      { q: "Câu 42. Nội dung nào sau đây không phản ánh đúng nhiệm vụ của hải đội Hoàng Sa và Bắc Hải dưới triều Nguyễn?", a: ["Dựng miếu thờ và trồng cây ở một số đảo", "Đo đạc và cắm dấu mốc tại nơi khảo sát", "Ngăn tàu thuyền nước ngoài đến buôn bán", "Tiến hành thu gom, khai thác sản vật biển"], c: 2 },
      { q: "Câu 43. Trong những năm 30 của thế kỉ XX, chính quyền Pháp đại diện cho Việt Nam trong quan hệ đối ngoại đã khẳng định chủ quyền của Việt Nam đối với quần đảo Hoàng Sa và Trường Sa thông qua việc", a: ["thành lập đội Hoàng Sa", "thành lập đội Bắc Hải", "xây dựng trạm khí tượng", "xây dựng sân bay lớn"], c: 2 },
      { q: "Câu 44. Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam đã khẳng định chủ quyền của Việt Nam đối với quần đảo Hoàng Sa và Trường Sa thông qua việc", a: ["thành lập huyện đảo Hoàng Sa và Trường Sa", "thành lập đội Hoàng Sa, Bắc Hải và Trường Đà", "cho hoàn thiện tập Đại Nam nhất thống toàn đồ", "cử thủy quân ra tuần tra đảo định kì hàng năm"], c: 0 },
      { q: "Câu 45. Từ cuối thế kỉ XIX đến năm 1945, quốc gia nào đại diện cho quyền lợi của Việt Nam tiếp tục khẳng định chủ quyền đối với quần đảo Hoàng Sa và Trường Sa?", a: ["Trung Quốc", "Anh", "Mĩ", "Pháp"], c: 3 },
      { q: "Câu 46. Sau khi Pháp rút khỏi Việt Nam theo Hiệp định Giơnevơ (1954), lực lượng nào sau đây đã tiếp quản và khẳng định chủ quyền đối với quần đảo Hoàng Sa và Trường Sa?", a: ["Chính quyền Sài Gòn", "Chính quyền Bảo Đại", "Chính quyền Pháp", "Chính phủ Việt Nam dân chủ cộng hòa"], c: 0 },
      { q: "Câu 47. Nhằm bảo vệ và thực thi chủ quyền, các quyền và lợi ích hợp pháp của Việt Nam ở Biển Đông, biện pháp nào sau đây không được nhà nước Việt Nam áp dụng?", a: ["Chủ động tấn công vũ trang", "Tuyên truyền chủ quyền biển, đảo", "Đàm phán ngoại giao", "Xây dựng lực lượng quản lý biển"], c: 0 },
      { q: "Câu 48. Nội dung nào sau đây không phải là hoạt động của Việt Nam để bảo vệ chủ quyền biển đảo hiện nay?", a: ["Kí kết với các nước láng giềng một số văn kiện ngoại giao quốc tế về biển", "Tham gia Công ước Luật biển năm 1982 của tổ chức Liên hợp quốc", "Chủ động tấn công ngăn chặn các nước có ý đồ xâm phạm biển", "Thực hiện đầy đủ Tuyên bố về ứng xử của các bên ở Biển Đông"], c: 2 },
      { q: "Câu 49. Chủ trương nhất quán của nước Cộng hòa xã hội chủ nghĩa Việt Nam trong việc giải quyết các tranh chấp ở Biển Đông hiện nay là", a: ["đấu tranh hòa bình", "bạo lực cách mạng", "chiến tranh cách mạng", "bãi công, bãi khóa"], c: 0 },
      { q: "Câu 50. Văn kiện nào sau đây được kí kết giữa các nước ASEAN và Trung Quốc nhằm duy trì hòa bình và ổn định ở Biển Đông?", a: ["Luật Biển Việt Nam", "Tuyên bố về ứng xử của các bên ở Biển Đông", "Luật Biên giới quốc gia", "Tuyên bố về các vùng biển và thềm lục địa Việt Nam"], c: 1 },
      { q: "Câu 51. Văn kiện nào sau đây do Nhà nước Việt Nam ban hành, khẳng định chủ quyền của nước ta đối với quần đảo Hoàng Sa và Trường Sa?", a: ["Công ước Liên hợp quốc về Luật biển", "Tuyên bố về ứng xử của các bên ở Biển Đông", "Luật Cảnh sát biển Việt Nam", "Hiến chương Liên hợp quốc"], c: 2 },
      { q: "Câu 52. Biển Đông là vùng biển thuộc", a: ["Ấn Độ Dương", "Thái Bình Dương", "Đại Tây Dương", "Địa Trung Hải"], c: 1 },
      { q: "Câu 53. Về vị trí địa lý, biển Đông được coi là cầu nối giữa Thái Bình Dương và", a: ["Bắc Băng Dương", "Ấn Độ Dương", "Đại Tây Dương", "Địa Trung Hải"], c: 1 },
      { q: "Câu 54. Biển Đông là vùng biển chung của 9 quốc gia ở châu Á, trong đó có", a: ["Trung Quốc", "Lào", "Ấn Độ", "Nhật Bản"], c: 0 },
      { q: "Câu 55. Phía tây nam của biển Đông nối với biển An - đa - man của Ấn Độ Dương thông qua eo biển", a: ["La - li - man - tan", "Ma - lắc - ca", "Lu - dông", "Đài Loan"], c: 1 },
      { q: "Câu 56. Tuyến đường vận tải quốc tế qua Biển Đông được coi là nhộn nhịp thứ 2 trên thế giới chỉ sau biển", a: ["Địa Trung Hải", "Hoa Đông", "Caribê", "Gia - va"], c: 0 },
      { q: "Câu 57. Eo biển Ma-lắc-ca là điểm điều tiết giao thông quan trọng bậc nhất ở châu lục nào sau đây?", a: ["Châu Âu", "Châu Mĩ", "Châu Phi", "Châu Á"], c: 3 },
      { q: "Câu 58. Biển Đông là một trong những biển lớn và là đường vận chuyển huyết mạch của khu vực", a: ["châu Á - Thái Bình Dương", "Bắc Mĩ và eo biển Đan Mạch", "châu Âu và mũi Hảo Vọng", "châu Phi và châu Nam Cực"], c: 0 },
      { q: "Câu 59. Biển Đông có ảnh hưởng trực tiếp tới cuộc sống của người dân ở một số nước thuộc khu vực nào sau đây?", a: ["Châu Phi", "Châu Mĩ", "Châu Âu", "Châu Á"], c: 3 },
      { q: "Câu 60. Biển Đông là vùng biển chung của 9 quốc gia ở châu Á, trong đó có", a: ["Ma - lai - xi - a", "Mĩ", "Liên bang Nga", "Mi - an - ma"], c: 0 },
      { q: "Câu 61. Các cảng biển lớn trên Biển Đông có vai trò nào sau đây?", a: ["Điểm trung chuyển của tàu thuyền", "Nơi khai thác và chế biến dầu khí", "Điểm tập trung phát triển du lịch", "Nơi giải quyết các vấn đề xã hội"], c: 0 },
      { q: "Câu 62. Eo biển Ma - lắc - ca là điểm điều tiết giao thông đường biển quan trọng, kết nối nhiều nước châu Á, trong đó có 3 nước đông dân của thế giới là In - đô - nê - xi - a, Trung Quốc và", a: ["Ai Cập", "Liên bang Nga", "Ấn Độ", "Mông Cổ"], c: 2 },
      { q: "Câu 63. Vùng biển nào sau đây là tuyến đường di chuyển ngắn nhất nối Thái Bình Dương và Ấn Độ Dương?", a: ["Biển Địa Trung Hải", "Biển Đông", "Biển Đỏ", "Biển Đen"], c: 1 },
      { q: "Câu 64. Trong lịch sử, Biển Đông được coi là tuyến đường thiết yếu trong giao thông, giao thương, di cư,... giữa", a: ["Trung Quốc và Nhật Bản", "Trung Quốc và Đông Á", "Ấn Độ và Nam Á", "Ấn Độ và Trung Quốc"], c: 3 },
      { q: "Câu 65. Các quốc gia ở khu vực nào sau đây có nền kinh tế gắn trực tiếp với con đường thương mại, hệ thống cảng biển và tài nguyên trên Biển Đông?", a: ["Đông Bắc Á và Tây Âu", "Đông Bắc Á và Đông Nam Á", "Đông Nam Á và Nam Á", "Nam Á và Tây Á"], c: 1 },
      { q: "Câu 66. Ở Biển Đông, nguồn tài nguyên thiên nhiên nào sau đây có trữ lượng vào loại lớn nhất thế giới?", a: ["Muối biển", "Băng cháy", "Dầu khí", "Quặng sắt"], c: 2 }
    ];

    const questionLibraries = {
      sucuoikihei: {
        label: "TRẮC NGHIỆM SỬ CUỐI KÌ HEI",
        questions: historyFinalHeiQuestionBank
      }
    };

    const CONFIG = {
      timePerQuestion: 300,
      leaderboardKey: "quizRank"
    };

    let questions = [];
    let index = 0;
    let score = 0;
    let timeLeft = CONFIG.timePerQuestion;
    let timer = null;
    let player = "";
    let selectedSubject = "";
    let selectedSubjectLabel = "";
    let wrongAnswers = [];
    let stats = [];
    let selectedAnswerIndexes = new Set();
    let submitted = false;

    const elements = {
      container: document.getElementById("container"),
      start: document.getElementById("start"),
      quiz: document.getElementById("quiz"),
      result: document.getElementById("result"),
      name: document.getElementById("name"),
      subject: document.getElementById("subject"),
      question: document.getElementById("question"),
      questionImage: document.getElementById("questionImage"),
      answers: document.getElementById("answers"),
      shortAnswerInput: document.getElementById("shortAnswerInput"),
      answerBox: document.getElementById("answerBox"),
      submitBtn: document.getElementById("submitBtn"),
      time: document.getElementById("time"),
      score: document.getElementById("score"),
      final: document.getElementById("final"),
      rank: document.getElementById("rank"),
      musicBtn: document.getElementById("musicBtn"),
      statsBox: document.getElementById("statsBox"),
      reviewBtn: document.getElementById("reviewBtn"),
      reviewPanel: document.getElementById("reviewPanel"),
      progress: document.getElementById("progress"),
      progressText: document.getElementById("progressText"),
      position: document.getElementById("position"),
      total: document.getElementById("total"),
      soundCorrect: document.getElementById("soundCorrect"),
      soundWrong: document.getElementById("soundWrong"),
      bgMusic: document.getElementById("bgMusic"),
      startBtn: document.getElementById("startBtn"),
      restartBtn: document.getElementById("restartBtn")
    };

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function normalizeQuestions(source) {
      return source.map((item) => {
        if (item.type === "short") {
          return {
            q: item.q,
            img: item.img || "",
            type: "short",
            answers: Array.isArray(item.answer) ? item.answer : [item.answer],
            explanation: item.explanation || ""
          };
        }
        return {
          q: item.q,
          img: item.img || "",
          type: "multiple",
          explanation: item.explanation || "",
          options: item.a.map((text, idx) => ({
            text,
            correct: (Array.isArray(item.c) ? item.c : [item.c]).includes(idx)
          }))
        };
      });
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function handleShortAnswerEnter(event) {
      if (event.key === "Enter") {
        submitAnswer(false);
      }
    }

    function startQuiz() {
      player = elements.name.value.trim();
      selectedSubject = elements.subject.value;
      const subjectPack = questionLibraries[selectedSubject];
      if (!player) {
        alert("Nhập tên 😌");
        return;
      }
      if (!subjectPack) {
        alert("Chọn môn học trước khi bắt đầu nhé 😌");
        return;
      }
      selectedSubjectLabel = subjectPack.label;

      questions = normalizeQuestions(subjectPack.questions);
      const shouldShuffleQuestions = subjectPack.shuffleQuestions !== false;
      if (shouldShuffleQuestions) {
        shuffle(questions);
      }
      questions.forEach((q) => {
        if (q.type === "multiple" && q.options && subjectPack.shuffleOptions !== false) {
          shuffle(q.options);
        }
      });
      wrongAnswers = [];
      stats = questions.map((q) => ({ question: q.q, correct: 0, wrong: 0 }));

      index = 0;
      score = 0;
      elements.score.textContent = score;
      elements.total.textContent = questions.length;
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      elements.reviewBtn.classList.add("hidden");
      elements.reviewPanel.classList.add("hidden");
      elements.reviewPanel.innerHTML = "";
      elements.statsBox.classList.add("hidden");
      elements.statsBox.innerHTML = "";

      elements.start.classList.add("hidden");
      elements.result.classList.add("hidden");
      elements.quiz.classList.remove("hidden");

      loadQuestion();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = CONFIG.timePerQuestion;
      elements.time.textContent = formatTime(timeLeft);

      timer = setInterval(() => {
        timeLeft -= 1;
        elements.time.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(timer);
          submitAnswer(true);
        }
      }, 1000);
    }

    function updateProgress() {
      const percent = (index / questions.length) * 100;
      elements.progress.style.width = `${percent}%`;
      elements.position.textContent = Math.min(index + 1, questions.length);
      elements.progressText.textContent = `Đang ở câu ${Math.min(index + 1, questions.length)}/${questions.length}`;
    }

    function loadQuestion() {
      const current = questions[index];
      updateProgress();
      startTimer();
      elements.container.classList.add("fade-in");
      setTimeout(() => {
        elements.container.classList.remove("fade-in");
      }, 500);

      elements.question.textContent = current.q;
      if (current.img) {
        elements.questionImage.src = current.img;
        elements.questionImage.classList.remove("hidden");
      } else {
        elements.questionImage.classList.add("hidden");
        elements.questionImage.removeAttribute("src");
      }
      
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      selectedAnswerIndexes = new Set();
      submitted = false;
      elements.submitBtn.disabled = false;
      elements.submitBtn.textContent = "Nộp đáp án";
      elements.shortAnswerInput.removeEventListener("keypress", handleShortAnswerEnter);

      if (current.type === "short") {
        elements.answers.innerHTML = "";
        elements.answers.classList.add("hidden");
        elements.shortAnswerInput.classList.remove("hidden");
        elements.shortAnswerInput.disabled = false;
        elements.shortAnswerInput.value = "";
        elements.shortAnswerInput.focus();
        elements.shortAnswerInput.addEventListener("keypress", handleShortAnswerEnter);
      } else {
        elements.shortAnswerInput.classList.add("hidden");
        elements.answers.classList.remove("hidden");
        elements.answers.innerHTML = "";
        current.options.forEach((option, optionIndex) => {
          const btn = document.createElement("button");
          btn.textContent = option.text;
          btn.className = "answer";
          btn.dataset.correct = option.correct ? "1" : "0";
          btn.dataset.optionIndex = String(optionIndex);
          btn.dataset.answer = option.text;
          btn.addEventListener("click", () => toggleAnswer(optionIndex, btn));
          elements.answers.appendChild(btn);
        });
      }
    }

    function playSound(audioEl) {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }

    function setMusicButtonState() {
      elements.musicBtn.textContent = elements.bgMusic.paused ? "🎵 Bật nhạc" : "🔇 Tắt nhạc";
    }

    async function toggleBgm() {
      if (!elements.bgMusic.paused) {
        elements.bgMusic.pause();
        setMusicButtonState();
        return;
      }

      elements.bgMusic.volume = 0.45;
      await elements.bgMusic.play();
      setMusicButtonState();
    }

    function wrongEffect(button) {
      button.classList.add("wrong");
      elements.container.classList.add("shake", "flash");
      playSound(elements.soundWrong);
      setTimeout(() => {
        elements.container.classList.remove("shake", "flash");
      }, 450);
    }

    function toggleAnswer(optionIndex, button) {
      if (submitted) {
        return;
      }

      if (selectedAnswerIndexes.has(optionIndex)) {
        selectedAnswerIndexes.delete(optionIndex);
        button.classList.remove("selected");
      } else {
        selectedAnswerIndexes.add(optionIndex);
        button.classList.add("selected");
      }
    }

    function submitAnswer(isTimeout = false) {
      if (submitted) {
        return;
      }

      const current = questions[index];

      if (current.type === "short") {
        // Handle short answer
        const userAnswer = elements.shortAnswerInput.value.trim().toLowerCase();
        
        if (!isTimeout && !userAnswer) {
          alert("Nhập câu trả lời rồi bấm nộp nhé 😌");
          return;
        }

        clearInterval(timer);
        submitted = true;
        elements.submitBtn.disabled = true;
        elements.shortAnswerInput.disabled = true;

        const correctAnswers = current.answers.map((ans) => ans.toLowerCase());
        const isCorrect = correctAnswers.includes(userAnswer);

        if (isCorrect) {
          score += 1;
          elements.score.textContent = score;
          playSound(elements.soundCorrect);
          elements.answerBox.textContent = `✅ Chính xác! Bạn nhập: "${userAnswer}"`;
          elements.answerBox.classList.add("show");
          elements.answerBox.style.background = "#0f8a0f";
        } else {
          playSound(elements.soundWrong);
          elements.container.classList.add("shake", "flash");
          setTimeout(() => {
            elements.container.classList.remove("shake", "flash");
          }, 450);
          const correctAnswer = current.answers.join(" hoặc ");
          elements.answerBox.textContent = `❌ Sai rồi! Đáp án đúng: ${correctAnswer}`;
          elements.answerBox.classList.add("show");
          elements.answerBox.style.background = "#8a0f0f";
          
          wrongAnswers.push({
            question: current.q,
            selected: userAnswer || "(không nhập gì)",
            correct: correctAnswer
          });
        }
      } else {
        // Handle multiple choice
        if (!isTimeout && selectedAnswerIndexes.size === 0) {
          alert("Chọn ít nhất 1 đáp án rồi bấm nộp nhé 😌");
          return;
        }

        clearInterval(timer);
        submitted = true;
        elements.submitBtn.disabled = true;

        const buttons = Array.from(elements.answers.children);
        buttons.forEach((btn) => {
          btn.disabled = true;
        });

        const correctIndexes = current.options
          .map((option, optionIndex) => (option.correct ? optionIndex : -1))
          .filter((value) => value >= 0);
        const allCorrectChosen =
          selectedAnswerIndexes.size === correctIndexes.length &&
          correctIndexes.every((correctIndex) => selectedAnswerIndexes.has(correctIndex));

        if (allCorrectChosen) {
          correctIndexes.forEach((correctIndex) => {
            const btn = buttons.find((item) => Number(item.dataset.optionIndex) === correctIndex);
            if (btn) {
              btn.classList.add("correct");
            }
          });
          score += 1;
          elements.score.textContent = score;
          playSound(elements.soundCorrect);
        } else {
          const selectedWrongButton = buttons.find((btn) => {
            const optionIndex = Number(btn.dataset.optionIndex);
            return selectedAnswerIndexes.has(optionIndex) && !correctIndexes.includes(optionIndex);
          });
          if (selectedWrongButton) {
            wrongEffect(selectedWrongButton);
          } else {
            elements.container.classList.add("shake", "flash");
            playSound(elements.soundWrong);
            setTimeout(() => {
              elements.container.classList.remove("shake", "flash");
            }, 450);
          }

          buttons.forEach((btn) => {
            const optionIndex = Number(btn.dataset.optionIndex);
            if (correctIndexes.includes(optionIndex)) {
              btn.classList.add("correct");
            } else if (selectedAnswerIndexes.has(optionIndex)) {
              btn.classList.add("wrong");
            }
          });

          const selectedAnswer = Array.from(selectedAnswerIndexes)
            .sort((first, second) => first - second)
            .map((answerIndex) => current.options[answerIndex]?.text)
            .filter(Boolean)
            .join(" | ") || "(không chọn đáp án nào)";
          const correctAnswer = correctIndexes
            .map((correctIndex) => current.options[correctIndex]?.text)
            .filter(Boolean)
            .join(" | ");

          wrongAnswers.push({
            question: current.q,
            selected: selectedAnswer,
            correct: correctAnswer
          });

          elements.answerBox.textContent = `Đáp án đúng là: ${correctAnswer}`;
          elements.answerBox.classList.add("show");
        }
      }

      setTimeout(nextQuestion, 1500);
    }

    function showStatistics() {
      const total = questions.length;
      const correctCount = score;
      const wrongCount = total - score;
      const percent = Math.round((correctCount / total) * 100);
      const topWrong = stats
        .map((item, idx) => ({ index: idx + 1, ...item }))
        .filter((item) => item.wrong > 0)
        .sort((a, b) => b.wrong - a.wrong)
        .slice(0, 3);

      elements.statsBox.classList.remove("hidden");
      elements.statsBox.innerHTML = `
        <h3>📊 Thống kê bài làm</h3>
        <p>✅ Đúng: ${correctCount}</p>
        <p>❌ Sai: ${wrongCount}</p>
        <p>📈 Tỉ lệ chính xác: ${percent}%</p>
        <div class="progress-stat"><div class="progress-fill" style="width:${percent}%"></div></div>
        <h4>🔥 Câu sai nhiều nhất:</h4>
      `;

      if (!topWrong.length) {
        const p = document.createElement("p");
        p.textContent = "Không có câu sai 🎉";
        elements.statsBox.appendChild(p);
        return;
      }

      topWrong.forEach((item) => {
        const p = document.createElement("p");
        p.textContent = `Câu ${item.index} - Sai ${item.wrong} lần`;
        elements.statsBox.appendChild(p);
      });
    }

    function showWrongAnswers() {
      elements.reviewPanel.classList.remove("hidden");

      elements.reviewPanel.innerHTML = "<h3>📋 Các câu bạn làm sai</h3>";

      wrongAnswers.forEach((item, order) => {
        const block = document.createElement("div");
        block.className = "review-block";
        block.innerHTML = `
          <p><strong>Câu ${order + 1}:</strong> ${item.question}</p>
          <p style="color:#ef4444;">Bạn chọn: ${item.selected}</p>
          <p style="color:#22c55e;">Đáp án đúng: ${item.correct}</p>
        `;
        elements.reviewPanel.appendChild(block);
      });
    }

    function nextQuestion() {
      index += 1;
      if (index < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function saveScore() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      data.push({ name: player, score, total: questions.length, time: Date.now() });
      data.sort((first, second) => {
        if (second.score !== first.score) {
          return second.score - first.score;
        }
        return first.time - second.time;
      });
      const top5 = data.slice(0, 5);
      localStorage.setItem(CONFIG.leaderboardKey, JSON.stringify(top5));
    }

    function showRank() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      elements.rank.innerHTML = "";
      data.forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = `${entry.name} - ${entry.score}/${questions.length}`;
        elements.rank.appendChild(li);
      });
      if (!data.length) {
        const li = document.createElement("li");
        li.textContent = "Chưa có dữ liệu";
        elements.rank.appendChild(li);
      }
    }

    function finishQuiz() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.remove("hidden");
      elements.final.textContent = `${player} · ${selectedSubjectLabel} · ${score}/${questions.length} điểm`;
      elements.progress.style.width = "100%";

      if (score === questions.length) {
        confetti({ particleCount: 220, spread: 110, origin: { y: 0.65 } });
      }

      saveScore();
      showRank();
      showStatistics();

      if (wrongAnswers.length > 0) {
        elements.reviewBtn.classList.remove("hidden");
      } else {
        elements.reviewBtn.classList.add("hidden");
      }
    }

    function restart() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.add("hidden");
      elements.start.classList.remove("hidden");
      elements.score.textContent = "0";
      elements.progress.style.width = "0%";
      elements.time.textContent = formatTime(CONFIG.timePerQuestion);
      elements.position.textContent = "1";
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      elements.answerBox.style.background = "#1e293b";
      elements.reviewBtn.classList.add("hidden");
      elements.reviewPanel.classList.add("hidden");
      elements.reviewPanel.innerHTML = "";
      elements.statsBox.classList.add("hidden");
      elements.statsBox.innerHTML = "";
      elements.shortAnswerInput.classList.add("hidden");
      elements.shortAnswerInput.value = "";
      elements.shortAnswerInput.disabled = false;
      elements.shortAnswerInput.removeEventListener("keypress", handleShortAnswerEnter);
      elements.name.focus();
    }

    elements.startBtn.addEventListener("click", startQuiz);
    elements.restartBtn.addEventListener("click", restart);
    elements.reviewBtn.addEventListener("click", showWrongAnswers);
    elements.submitBtn.addEventListener("click", () => submitAnswer(false));
    elements.musicBtn.addEventListener("click", () => {
      toggleBgm().catch(() => {
        elements.bgMusic.pause();
        setMusicButtonState();
      });
    });
    elements.name.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startQuiz();
      }
    });

    setMusicButtonState();
  </script>
</body>
</html>
