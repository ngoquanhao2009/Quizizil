  <style>
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #1e293b);

      justify-content: center;
      align-items: center;

    .page {
      width: 100%;

      flex-direction: column;
      align-items: center;

    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.45);
    }

    .main-title {
      margin: 0;
      text-align: left;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(90deg, #8b5cf6, #22d3ee, #8b5cf6);
      background-size: 200%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shine 6s linear infinite;
      text-shadow: 0 0 18px rgba(34, 211, 238, 0.2);
    }

    .main-title span {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 4px;
      background: none;
      background-clip: border-box;
      -webkit-background-clip: border-box;
    }

    .container {
      width: min(92vw, 560px);
      backdrop-filter: blur(15px);
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.25), 0 15px 40px rgba(0, 0, 0, 0.35);

      position: relative;
    }

    .music-btn {
      margin-top: 6px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      background: #334155;
      color: #e2e8f0;
    }

    input,
    select,
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 15px;
    }

    input,
    select {
      width: min(80%, 320px);
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .answer {
      width: 100%;
      margin: 8px 0;
      background: #3498db;
      color: white;
      transition: 0.2s;
    }

    .answer:hover {
      transform: scale(1.02);
    }

    .answer.selected {
      background: #7c3aed;
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.45) inset;
    }

    .correct {
      background: #16a34a !important;
      color: white;
      transform: scale(1.03);
    }

    .wrong {
      background: #dc2626 !important;
      color: white;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      gap: 10px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      background: #2ecc71;
      width: 0;
      transition: 0.4s;
    }

    #question {
      white-space: pre-line;
      text-align: left;
      line-height: 1.45;
    }

    .flash {
      box-shadow: 0 0 0 9999px rgba(231, 76, 60, 0.2) inset;
    }

    .fade-in {
      animation: fadeIn 0.5s ease;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shine {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.4s;
    }

    ol {
      text-align: left;
      margin: 0 auto;
      max-width: 320px;
      padding-left: 24px;
    }

    li {
      margin: 6px 0;
    }

    .meta {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 8px;
    }

    .answer-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }

    .answer-box.show {
      display: block;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .review-btn {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .review-block {
      margin: 12px 0;
      padding: 12px;
      background: #0f172a;
      border-radius: 10px;
      text-align: left;
    }

    .review-block p {
      margin: 6px 0;
    }

    .stat-box {
      margin-top: 16px;
      padding: 15px;
      border-radius: 12px;
      background: #0f172a;
      text-align: left;
    }

    .progress-stat {
      height: 15px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    #reviewPanel {
      margin-top: 12px;
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <img src="logo.png" alt="Logo Trắc Nghiệm Đề Cương" class="brand-logo" />
      <h1 class="main-title">
        Trắc Nghiệm Đề Cương
        <span>by ngoquanhao2009</span>
      </h1>

    <div class="container" id="container">
      <div id="start">

  <script>
    const questionBank = [
      { q: "Câu 1. Hệ điều hành nào được phát triển từ mã nguồn mở và ra mắt lần đầu năm 1991?", a: ["Windows", "Linux", "macOS", "Android"], c: 1 },
      { q: "Câu 2. Ngôn ngữ lập trình nào được sử dụng phổ biến nhất trong việc phát triển hệ điều hành?", a: ["C++", "Java", "Python", "Ruby"], c: 0 },
      { q: "Câu 3. Người dùng đăng ký sử dụng dịch vụ và được cấp một không gian lưu trữ trực tuyến gọi là?", a: ["Nhà lưu trữ", "Cầu kết nối", "Bát online", "Ổ đĩa trực tuyến"], c: 3 },
      { q: "Câu 4. Tải tệp lên ổ đĩa trực tuyến cho người dùng để…", a: ["Xóa các tệp và file trong máy tính mình đi", "Lưu trữ và sử dụng", "Mua bán thông tin lưu trữ của nhau", "Giải trí"], c: 1 },
      { q: "Câu 5. Những hành vi, hành động nào sau đây bị nghiêm cấm trong môi trường mạng?", a: ["Sử dụng mật mã để bảo vệ thông tin mạng.", "Thực hiện tấn công mạng, khủng bố mạng, gián điệp mạng, tội phạm mạng; gây sự cố, tấn công, xâm nhập, chiếm quyền điều khiển, làm sai lệch, gián đoạn, ngưng trệ, tê liệt hoặc phá hoại hệ thống thông tin quan trọng về an ninh quốc gia.", "Nghiên cứu, phân tích thông tin an ninh mạng.", "Tuyên truyền cách phòng chống tội phạm trong môi trường mạng."], c: 1 },
      { q: "Câu 6. Khi có một yêu cầu thanh toán hoặc chuyển tiền, cung cấp thông tin cá nhân ngay lập tức từ số điện thoại lạ chúng ta cần:", a: ["Dừng lại, không gửi", "Chuyển tiền ngay", "Cung cấp thông tin cá nhân", "Cung cấp số tài khoản ngân hàng, mã OTP"], c: 0 },
      { q: "Câu 7. Cập nhật dữ liệu là ...", a: ["Quá trình ghi (lưu trữ) thông tin (dữ liệu) trong một phương tiện lưu trữ.", "Quá trình thêm, xóa và chỉnh sửa dữ liệu.", "Quá trình tìm kiếm, sắp xếp hay lọc ra các dữ liệu theo những tiêu chí nào đó từ dữ liệu đã có.", "Quá trình phân tích, thống kê, tính toán từ dữ liệu đã có để được thông tin cần thiết."], c: 1 },
      { q: "Câu 8. Quá trình thêm, xóa và chỉnh sửa dữ liệu thường được gọi là ...", a: ["Lưu trữ dữ liệu.", "Cập nhật dữ liệu.", "Truy xuất dữ liệu.", "Khai thác thông tin."], c: 1 },
      { q: "Câu 9. Công việc nào dưới đây KHÔNG phải là công việc cập nhật dữ liệu?", a: ["Ghi chép (thêm) dữ liệu mới thu thập được.", "Xóa dữ liệu không còn ý nghĩa.", "Sửa chữa dữ liệu đã có để đảm bảo tính chính xác của dữ liệu.", "Tìm kiếm các dữ liệu thỏa mãn một tiêu chí xác định."], c: 3 },
      { q: "Câu 10. Phát biểu nào sai trong các phát biểu sau khi nói về khoá chính?", a: ["Một bảng có thể có nhiều khoá chính", "Mỗi bảng có ít nhất một khoá", "Xác định khoá phụ thuộc vào quan hệ logic của các dữ liệu chứ không phụ thuộc vào giá trị các dữ liệu", "Nên chọn khoá chính là khoá có ít thuộc tính nhất"], c: 0 },
      { q: "Câu 11. Giả sử một bảng có 2 trường Aid (số bảo hiểm) và TenNS (họ tên) thì nên chọn trường Aid làm khoá chính hơn vì.", a: ["Trường Aid là duy nhất, trong khi đó trường TenNS không phải là duy nhất", "Trường Aid là kiểu số, trong khi đó trường TenNS không phải là kiểu số", "Trường Aid đứng trước trường TenNS", "Trường Aid là trường ngắn hơn"], c: 0 },
      { q: "Câu 12. CSDL quan hệ là:", a: ["Là CSDL lưu trữ dữ liệu dưới dạng các bảng có quan hệ với nhau.", "Mô hình dữ liệu quan hệ nhiều bảng với nhau", "Mô hình hướng đối tượng trong bảng", "Mô hình cơ sở quan hệ CSDL."], c: 0 },
      { q: "Câu 13. Trong mô hình quan hệ, về mặt cấu trúc thì dữ liệu được thể hiện trong các:", a: ["Cột (Field).", "Hàng (Record).", "Bảng (Table).", "Báo cáo (Report)"], c: 2 },
      { q: "Câu 14. Em hãy điền vào chỗ trống: nếu tên trường có chứa dấu cách thì cần dùng dấu nào để đánh dấu bắt đầu và kết thúc tên trường?", a: ["( )", "‘ ’", "[ ]", "“ ”"], c: 2 },
      { q: "Câu 15. Trong mẫu câu truy vấn của SQL, mệnh đề SELECT dùng để làm gì?", a: ["Xác định điều kiện lọc dữ liệu", "Thêm dữ liệu vào bảng", "Xác định dữ liệu được lấy từ đâu", "Xác định thông tin ta muốn hiển thị"], c: 3 },
      { q: "Câu 16. Trong mẫu câu truy vấn của SQL, mệnh đề FROM dùng để làm gì?", a: ["Xác định điều kiện lọc dữ liệu", "Xác định dữ liệu được lấy từ đâu", "Xác định thông tin ta muốn hiển thị", "Xóa dữ liệu trong bảng"], c: 1 },
      { q: "Câu 17. Cho truy vấn SELECT [Họ và tên], [Giới tính], [Toán] FROM [HỌC SINH 11] WHERE [Giới tính] = “Nữ”, truy vấn cho biết thông tin nào?", a: ["Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh nữ", "Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh nam", "Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh", "Đưa ra danh sách gồm: họ và tên, giới tính của tất cả các học sinh"], c: 0 },
      { q: "Câu 18. Khi thực hiện thao tác lọc dữ liệu ta sử dụng:", a: ["Mẫu hỏi (Query)", "Biểu mẫu (Form)", "Liên kết bảng", "Báo cáo (report)"], c: 0 },
      { q: "Câu 19. Trong CSDL, việc thực hiện lọc dữ liệu theo yêu cầu nào đó gọi là gì?", a: ["Tạo biểu mẫu (tạo Form)", "Thiết kế bảng", "Truy vấn dữ liệu", "Tạo báo cáo"], c: 2 },
      { q: "Câu 20. Để lọc ra tất cả học sinh khá, ta dùng biểu thức nào sau đây đối với “Điểm Trung bình”?", a: [">=6.5 OR <8", ">=6.5 AND <8", ">=6.5 NO <8", ">=6.5 BETWEEN <8"], c: 1 },
      { q: "Câu 21. Việc ghi điểm vào sổ điểm được thực hiện thường xuyên, mỗi khi có điểm đánh giá thường xuyên, giữa kì hay cuối kì. Việc ghi chép này gọi là ...?", a: ["Lưu trữ dữ liệu.", "Khai thác thông tin.", "Truy xuất dữ liệu.", "Cập nhật dữ liệu."], c: 3 },
      { q: "Câu 22. Ngôn ngữ truy vấn CSDL phổ biến hiện nay là:", a: ["ExceL", "Word", "Access", "SQL"], c: 3 },
      { q: "Câu 23. Trong mô hình cơ sở dữ liệu quan hệ, mỗi hàng (record) trong một bảng phải:", a: ["Có thể trùng lặp hoàn toàn với hàng khác", "Có ít nhất một trường để trống", "Được xác định duy nhất bởi khóa chính", "Chỉ chứa dữ liệu kiểu số"], c: 2 },
      { q: "Câu 24. Trong câu lệnh SQL, mệnh đề WHERE dùng để:", a: ["Sắp xếp dữ liệu theo thứ tự tăng hoặc giảm", "Xác định điều kiện lọc các bản ghi", "Thêm một bản ghi mới vào bảng", "Xác định bảng chứa dữ liệu"], c: 1 },

      {
        q: "Câu 25: Giờ kiểm tra môn Tin học, An muốn mở file bài tập “Baitap1.docx” đã lưu trong ổ đĩa D của máy tính để nộp cho giáo viên. An thực hiện thao tác mở ổ đĩa D và tìm kiếm file “Baitap1.docx”.\nMột số bạn cho rằng:",
        a: [
          "a) An đang thực hiện thao tác cập nhật dữ liệu.",
          "b) An đang thực hiện thao tác truy xuất dữ liệu.",
          "c) An đang thực hiện thao tác khai thác thông tin.",
          "d) An đang thực hiện thao tác thu thập dữ liệu."
        ],
        c: [1]
      },
      {
        q: "Câu 26: Trong các phát biểu dưới đây, phát biểu nào đúng với câu truy vấn SQL sau?\nSELECT [Họ và tên], [Lương], [Trợ cấp]\nFROM [KT-LƯƠNG]\nWHERE (Lương <7000000)",
        a: [
          "a) Hiển thị những bản ghi có giá trị trường Lương chưa đến 7000000 trong bảng KT-LƯƠNG.",
          "b) Hiển thị các trường Họ và tên, Lương, Trợ cấp của những bản ghi thoả mãn điều kiện (Lương < 7000000).",
          "c) Lấy ra từ bảng KT-LƯƠNG các bản ghi thoả mãn điều kiện (Lương < 7000000), chỉ hiển thị các trường Họ và tên, Lương, Trợ cấp của những bản ghi này.",
          "d) Lấy ra từ bảng KT-LƯƠNG một bảng con chỉ có các trường Họ và tên, Lương, Trợ cấp và chỉ gồm các bản ghi thoả mãn điều kiện (Lương<7000000)."
        ],
        c: [0, 1, 2, 3]
      },
      {
        q: "Câu 27: Hệ thống nào sau đây là hệ CSDL?",
        a: [
          "a) Phần mềm hệ quản trị CSDL Microsoft Access và CSDL quản lí học vụ của một trường học.",

    const questionLibraries = {
      tin11: {
        label: "Tin học 11",
        questions: questionBank
      },
      ls11gk2: {
        label: "Kiểm tra giữa kì II môn Lịch Sử 11",
        questions: historyQuestionBank
      }
    };

    const CONFIG = {
      timePerQuestion: 300,
      leaderboardKey: "quizRank"
    };

    let questions = [];
    let index = 0;
    let score = 0;
    let timeLeft = CONFIG.timePerQuestion;
    let timer = null;
    let player = "";
    let selectedSubject = "";
    let selectedSubjectLabel = "";
    let wrongAnswers = [];
    let stats = [];
    let selectedAnswerIndexes = new Set();
    let submitted = false;

    const elements = {
      container: document.getElementById("container"),
      start: document.getElementById("start"),
      quiz: document.getElementById("quiz"),
      result: document.getElementById("result"),
      name: document.getElementById("name"),
      subject: document.getElementById("subject"),
      question: document.getElementById("question"),
      answers: document.getElementById("answers"),
      answerBox: document.getElementById("answerBox"),
      submitBtn: document.getElementById("submitBtn"),
      time: document.getElementById("time"),
      score: document.getElementById("score"),
      final: document.getElementById("final"),
      rank: document.getElementById("rank"),
      musicBtn: document.getElementById("musicBtn"),
      statsBox: document.getElementById("statsBox"),
      reviewBtn: document.getElementById("reviewBtn"),
      reviewPanel: document.getElementById("reviewPanel"),
      progress: document.getElementById("progress"),
      progressText: document.getElementById("progressText"),
      position: document.getElementById("position"),
      total: document.getElementById("total"),
      soundCorrect: document.getElementById("soundCorrect"),
      soundWrong: document.getElementById("soundWrong"),
      bgMusic: document.getElementById("bgMusic"),
      startBtn: document.getElementById("startBtn"),
      restartBtn: document.getElementById("restartBtn")
    };

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function normalizeQuestions(source) {
      return source.map((item) => ({
        q: item.q,
        options: item.a.map((text, idx) => ({
          text,
          correct: (Array.isArray(item.c) ? item.c : [item.c]).includes(idx)
        }))
      }));
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function startQuiz() {
      player = elements.name.value.trim();
      selectedSubject = elements.subject.value;
      const subjectPack = questionLibraries[selectedSubject];
      if (!player) {
        alert("Nhập tên 😌");
        return;
      }
      if (!subjectPack) {
        alert("Chọn môn học trước khi bắt đầu nhé 😌");
        return;
      }

      selectedSubjectLabel = subjectPack.label;

      questions = normalizeQuestions(subjectPack.questions);
      shuffle(questions);
      questions.forEach((q) => shuffle(q.options));
      wrongAnswers = [];
      stats = questions.map((q) => ({ question: q.q, correct: 0, wrong: 0 }));

      index = 0;
      score = 0;
      elements.score.textContent = score;
      elements.total.textContent = questions.length;
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      elements.reviewBtn.classList.add("hidden");
      elements.reviewPanel.classList.add("hidden");
      elements.reviewPanel.innerHTML = "";
      elements.statsBox.classList.add("hidden");
      elements.statsBox.innerHTML = "";

      elements.start.classList.add("hidden");
      elements.result.classList.add("hidden");
      elements.quiz.classList.remove("hidden");

      loadQuestion();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = CONFIG.timePerQuestion;
      elements.time.textContent = formatTime(timeLeft);

      timer = setInterval(() => {
        timeLeft -= 1;
        elements.time.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(timer);
          submitAnswer(true);
        }
      }, 1000);
    }

    function updateProgress() {
      const percent = (index / questions.length) * 100;
      elements.progress.style.width = `${percent}%`;
      elements.position.textContent = Math.min(index + 1, questions.length);
      elements.progressText.textContent = `Đang ở câu ${Math.min(index + 1, questions.length)}/${questions.length}`;
    }

    function loadQuestion() {
      const current = questions[index];
      updateProgress();
      startTimer();
      elements.container.classList.add("fade-in");
      setTimeout(() => {
        elements.container.classList.remove("fade-in");
      }, 500);

      elements.question.textContent = current.q;
      elements.answers.innerHTML = "";
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      selectedAnswerIndexes = new Set();
      submitted = false;
      elements.submitBtn.disabled = false;

      current.options.forEach((option, optionIndex) => {
        const btn = document.createElement("button");
        btn.textContent = option.text;
        btn.className = "answer";
        btn.dataset.correct = option.correct ? "1" : "0";
        btn.dataset.optionIndex = String(optionIndex);
        btn.dataset.answer = option.text;
        btn.addEventListener("click", () => toggleAnswer(optionIndex, btn));
        elements.answers.appendChild(btn);
      });
    }

    function playSound(audioEl) {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }

    function setMusicButtonState() {
      elements.musicBtn.textContent = elements.bgMusic.paused ? "🎵 Bật nhạc" : "🔇 Tắt nhạc";
    }

    async function toggleBgm() {
      if (!elements.bgMusic.paused) {
        elements.bgMusic.pause();
        setMusicButtonState();
        return;
      }

      elements.bgMusic.volume = 0.45;
      await elements.bgMusic.play();
      setMusicButtonState();
    }

    function wrongEffect(button) {
      button.classList.add("wrong");
      elements.container.classList.add("shake", "flash");
      playSound(elements.soundWrong);
      setTimeout(() => {
        elements.container.classList.remove("shake", "flash");
      }, 450);
    }

    function toggleAnswer(optionIndex, button) {
      if (submitted) {
        return;
      }

      if (selectedAnswerIndexes.has(optionIndex)) {
        selectedAnswerIndexes.delete(optionIndex);
        button.classList.remove("selected");
      } else {
        selectedAnswerIndexes.add(optionIndex);
        button.classList.add("selected");
      }
    }

    function submitAnswer(isTimeout = false) {
      if (submitted) {
        return;
      }

      if (!isTimeout && selectedAnswerIndexes.size === 0) {
        alert("Chọn ít nhất 1 đáp án rồi bấm nộp nhé 😌");
        return;
      }

      clearInterval(timer);
      submitted = true;
      elements.submitBtn.disabled = true;

      const current = questions[index];
      const buttons = Array.from(elements.answers.children);
      buttons.forEach((btn) => {
        btn.disabled = true;
      });

      const correctIndexes = current.options
        .map((option, optionIndex) => (option.correct ? optionIndex : -1))
        .filter((value) => value >= 0);
      const allCorrectChosen =
        selectedAnswerIndexes.size === correctIndexes.length &&
        correctIndexes.every((correctIndex) => selectedAnswerIndexes.has(correctIndex));

      if (allCorrectChosen) {
        stats[index].correct += 1;
        correctIndexes.forEach((correctIndex) => {
          const btn = buttons.find((item) => Number(item.dataset.optionIndex) === correctIndex);
          if (btn) {
            btn.classList.add("correct");
          }
        });
        score += 1;
        elements.score.textContent = score;
        playSound(elements.soundCorrect);
      } else {
        stats[index].wrong += 1;

        const selectedWrongButton = buttons.find((btn) => {
          const optionIndex = Number(btn.dataset.optionIndex);
          return selectedAnswerIndexes.has(optionIndex) && !correctIndexes.includes(optionIndex);
        });
        if (selectedWrongButton) {
          wrongEffect(selectedWrongButton);
        } else {
          elements.container.classList.add("shake", "flash");
          playSound(elements.soundWrong);
          setTimeout(() => {
            elements.container.classList.remove("shake", "flash");
          }, 450);
        }

        buttons.forEach((btn) => {
          const optionIndex = Number(btn.dataset.optionIndex);
          if (correctIndexes.includes(optionIndex)) {
            btn.classList.add("correct");
          } else if (selectedAnswerIndexes.has(optionIndex)) {
            btn.classList.add("wrong");
          }
        });

        const selectedAnswer = Array.from(selectedAnswerIndexes)
          .sort((first, second) => first - second)
          .map((answerIndex) => current.options[answerIndex]?.text)
          .filter(Boolean)
          .join(" | ") || "(không chọn đáp án nào)";
        const correctAnswer = correctIndexes
          .map((correctIndex) => current.options[correctIndex]?.text)
          .filter(Boolean)
          .join(" | ");

        wrongAnswers.push({
          question: current.q,
          selected: selectedAnswer,
          correct: correctAnswer
        });

        elements.answerBox.textContent = `Đáp án đúng là: ${correctAnswer}`;
        elements.answerBox.classList.add("show");
      }

      setTimeout(nextQuestion, 1500);
    }

    function showStatistics() {
      const total = questions.length;
      const correctCount = score;
      const wrongCount = total - score;
      const percent = Math.round((correctCount / total) * 100);
      const topWrong = stats
        .map((item, idx) => ({ index: idx + 1, ...item }))
        .filter((item) => item.wrong > 0)
        .sort((a, b) => b.wrong - a.wrong)
        .slice(0, 3);

      elements.statsBox.classList.remove("hidden");
      elements.statsBox.innerHTML = `
        <h3>📊 Thống kê bài làm</h3>
        <p>✅ Đúng: ${correctCount}</p>
        <p>❌ Sai: ${wrongCount}</p>
        <p>📈 Tỉ lệ chính xác: ${percent}%</p>
        <div class="progress-stat"><div class="progress-fill" style="width:${percent}%"></div></div>
        <h4>🔥 Câu sai nhiều nhất:</h4>
      `;

      if (!topWrong.length) {
        const p = document.createElement("p");
        p.textContent = "Không có câu sai 🎉";
        elements.statsBox.appendChild(p);
        return;
      }

      topWrong.forEach((item) => {
        const p = document.createElement("p");
        p.textContent = `Câu ${item.index} - Sai ${item.wrong} lần`;
        elements.statsBox.appendChild(p);
      });
    }

    function showWrongAnswers() {
      elements.reviewPanel.classList.remove("hidden");
      elements.reviewPanel.innerHTML = "<h3>📋 Các câu bạn làm sai</h3>";

      wrongAnswers.forEach((item, order) => {
        const block = document.createElement("div");
        block.className = "review-block";
        block.innerHTML = `
          <p><strong>Câu ${order + 1}:</strong> ${item.question}</p>
          <p style="color:#ef4444;">Bạn chọn: ${item.selected}</p>
          <p style="color:#22c55e;">Đáp án đúng: ${item.correct}</p>
        `;
        elements.reviewPanel.appendChild(block);
      });
    }

    function nextQuestion() {
      index += 1;
      if (index < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function saveScore() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      data.push({ name: player, score, total: questions.length, time: Date.now() });
      data.sort((first, second) => {
        if (second.score !== first.score) {
          return second.score - first.score;
        }
        return first.time - second.time;
      });
      const top5 = data.slice(0, 5);
      localStorage.setItem(CONFIG.leaderboardKey, JSON.stringify(top5));
    }

    function showRank() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      elements.rank.innerHTML = "";
      data.forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = `${entry.name} - ${entry.score}/${questions.length}`;
        elements.rank.appendChild(li);
      });
      if (!data.length) {
        const li = document.createElement("li");
        li.textContent = "Chưa có dữ liệu";
        elements.rank.appendChild(li);
      }
    }

    function finishQuiz() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.remove("hidden");
      elements.final.textContent = `${player} · ${selectedSubjectLabel} · ${score}/${questions.length} điểm`;
      elements.progress.style.width = "100%";

      if (score === questions.length) {
        confetti({ particleCount: 220, spread: 110, origin: { y: 0.65 } });
      }

      saveScore();
      showRank();
      showStatistics();

      if (wrongAnswers.length > 0) {
        elements.reviewBtn.classList.remove("hidden");
      } else {
        elements.reviewBtn.classList.add("hidden");
      }
    }

    function restart() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.add("hidden");
      elements.start.classList.remove("hidden");
      elements.score.textContent = "0";
      elements.progress.style.width = "0%";
      elements.time.textContent = formatTime(CONFIG.timePerQuestion);
      elements.position.textContent = "1";
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      elements.reviewBtn.classList.add("hidden");
      elements.reviewPanel.classList.add("hidden");
      elements.reviewPanel.innerHTML = "";
      elements.statsBox.classList.add("hidden");
      elements.statsBox.innerHTML = "";
      elements.name.focus();
    }

    elements.startBtn.addEventListener("click", startQuiz);
    elements.restartBtn.addEventListener("click", restart);
    elements.reviewBtn.addEventListener("click", showWrongAnswers);
    elements.submitBtn.addEventListener("click", () => submitAnswer(false));
    elements.musicBtn.addEventListener("click", () => {
      toggleBgm().catch(() => {
        elements.bgMusic.pause();
        setMusicButtonState();
      });
    });
    elements.name.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startQuiz();
      }
    });

    setMusicButtonState();
  </script>
</body>
</html>
