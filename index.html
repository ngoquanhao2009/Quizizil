<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trắc Nghiệm Đề Cương | by ngoquanhao2009</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #1e293b);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
      padding: 16px;
      box-sizing: border-box;
    }

    .page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.45);
    }

    .main-title {
      margin: 0;
      text-align: left;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(90deg, #8b5cf6, #22d3ee, #8b5cf6);
      background-size: 200%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shine 6s linear infinite;
      text-shadow: 0 0 18px rgba(34, 211, 238, 0.2);
    }

    .main-title span {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 4px;
      background: none;
      background-clip: border-box;
      -webkit-background-clip: border-box;
    }

    .container {
      width: min(92vw, 560px);
      backdrop-filter: blur(15px);
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.25), 0 15px 40px rgba(0, 0, 0, 0.35);
      transition: 0.3s;
      position: relative;
    }

    .container.reading-mode {
      width: min(96vw, 1080px);
    }

    .music-btn {
      margin-top: 6px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      background: #334155;
      color: #e2e8f0;
    }

    input,
    select,
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 15px;
    }

    input,
    select {
      width: min(80%, 320px);
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      pointer-events: auto;
      z-index: 10;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .answer {
      width: 100%;
      margin: 8px 0;
      background: #3498db;
      color: white;
      transition: 0.2s;
    }

    .answer:hover {
      transform: scale(1.02);
    }

    .answer.selected {
      background: #7c3aed;
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.45) inset;
    }

    .correct {
      background: #16a34a !important;
      color: white;
      transform: scale(1.03);
    }

    .wrong {
      background: #dc2626 !important;
      color: white;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      gap: 10px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      background: #2ecc71;
      width: 0;
      transition: 0.4s;
    }

    #question {
      white-space: pre-line;
      text-align: left;
      line-height: 1.45;
    }

    .quiz-layout {
      display: block;
    }

    #quiz.reading-active .quiz-layout {
      display: grid;
      grid-template-columns: minmax(300px, 1.05fr) minmax(320px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .reading-pane {
      text-align: left;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      padding: 14px;
      max-height: 480px;
      overflow-y: auto;
    }

    .reading-title {
      margin: 0 0 10px;
      color: #22d3ee;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .reading-content {
      white-space: pre-line;
      color: #cbd5e1;
      line-height: 1.62;
      font-size: 14px;
    }

    .question-pane {
      text-align: left;
    }

    .question-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      margin: 8px 0 10px;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .flash {
      box-shadow: 0 0 0 9999px rgba(231, 76, 60, 0.2) inset;
    }

    .fade-in {
      animation: fadeIn 0.5s ease;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shine {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.4s;
    }

    ol {
      text-align: left;
      margin: 0 auto;
      max-width: 320px;
      padding-left: 24px;
    }

    li {
      margin: 6px 0;
    }

    .meta {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 8px;
    }

    .answer-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }

    .answer-box.show {
      display: block;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .review-btn {
      margin-top: 14px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .review-block {
      margin: 12px 0;
      padding: 12px;
      background: #0f172a;
      border-radius: 10px;
      text-align: left;
    }

    .review-block p {
      margin: 6px 0;
    }

    .stat-box {
      margin-top: 16px;
      padding: 15px;
      border-radius: 12px;
      background: #0f172a;
      text-align: left;
    }

    .progress-stat {
      height: 15px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    #reviewPanel {
      margin-top: 12px;
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
      text-align: left;
    }

    .footer-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      justify-content: center;
    }

    .visitor-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(34, 211, 238, 0.25);
      padding: 8px 14px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.15);
    }

    .fox-container {
      position: relative;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .fox {
      font-size: 28px;
      animation: foxFloat 4s ease-in-out infinite;
      transform-origin: center;
      will-change: transform;
    }

    @keyframes foxFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .counter-display {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      white-space: nowrap;
    }

    .counter-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .counter-value {
      font-size: 18px;
      color: #22d3ee;
      display: inline-block;
      min-width: 35px;
      text-align: right;
      font-weight: 800;
    }

    @media (max-width: 860px) {
      .container.reading-mode {
        width: min(96vw, 760px);
      }

      #quiz.reading-active .quiz-layout {
        grid-template-columns: 1fr;
      }

      .reading-pane {
        max-height: 280px;
      }
    }

    @media (max-width: 640px) {
      .footer-container {
        flex-direction: column;
        gap: 10px;
      }

      input,
      select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <img src="logo.png" alt="Logo Trắc Nghiệm Đề Cương" class="brand-logo" />
      <h1 class="main-title">
        Trắc Nghiệm Đề Cương
        <span>by ngoquanhao2009</span>
      </h1>
    </div>

    <div class="container" id="container">
      <div id="start">
        <h2>🎯 Quizizi Elite</h2>
        <p class="meta">trên bước đường thành công sẽ có dấu xe của kẻ lười biếng</p>
        <input id="name" placeholder="Nhập tên" />
        <br />
        <select id="subject">
          <option value="">-- Chọn môn học --</option>
          <option value="tin11">Tin học 11</option>
          <option value="ls11gk2">Kiểm tra giữa kì II môn Lịch Sử 11</option>
          <option value="sinh11gk2">Kiểm tra giữa kì II môn Sinh học 11</option>
          <option value="readingidea">Bài đọc ý tưởng (2 phần)</option>
          <option value="tester">TESTER</option>
        </select>
        <br />
        <button id="startBtn">Bắt đầu</button>
      </div>

      <div id="quiz" class="hidden">
        <div class="topbar">
          <span>⏳ <span id="time">05:00</span></span>
          <span>⭐ <span id="score">0</span></span>
          <span>🧩 <span id="position">1</span>/<span id="total">28</span></span>
        </div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <p class="meta" id="progressText">Đang ở câu 1/28</p>
        <div id="quizLayout" class="quiz-layout">
          <div id="readingPane" class="reading-pane hidden">
            <h3 id="readingTitle" class="reading-title"></h3>
            <div id="readingContent" class="reading-content"></div>
          </div>
          <div class="question-pane">
            <h3 id="question"></h3>
            <img id="questionImage" class="question-image hidden" alt="Hình minh họa câu hỏi" />
            <div id="answers"></div>
            <input id="shortAnswerInput" type="text" placeholder="Nhập câu trả lời..." class="hidden" />
            <button id="submitBtn">Nộp đáp án</button>
            <div id="answerBox" class="answer-box"></div>
          </div>
        </div>
      </div>

      <div id="result" class="hidden">
        <h2>🏆 Hoàn thành</h2>
        <p id="final"></p>
        <div id="statsBox" class="stat-box hidden"></div>
        <h3>Top 5</h3>
        <ol id="rank"></ol>
        <button id="reviewBtn" class="review-btn hidden">Xem lại câu sai</button>
        <div id="reviewPanel" class="hidden"></div>
        <button id="restartBtn">Chơi lại</button>
      </div>
    </div>
    <div class="footer-container">
      <div class="visitor-counter">
        <div class="fox-container">
          <div class="fox">🦊</div>
        </div>
        <div class="counter-display">
          <span class="counter-label">👥 Lượt thăm:</span>
          <span class="counter-value" id="visitorCount">0</span>
        </div>
      </div>
      <button id="musicBtn" class="music-btn" type="button">🎵 Bật nhạc</button>
    </div>

  <audio id="soundCorrect" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3"></audio>
  <audio id="soundWrong" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
  <audio id="bgMusic" src="videoplayback (1).m4a" loop preload="auto"></audio>

  <script>
    // Visitor Counter - Simple & Optimized
    const VISITOR_KEY = "quizVisitorCount";
    
    function initializeVisitorCounter() {
      let count = parseInt(localStorage.getItem(VISITOR_KEY)) || 0;
      count++;
      localStorage.setItem(VISITOR_KEY, count);
      
      const counterElement = document.getElementById("visitorCount");
      if (counterElement) {
        counterElement.textContent = count;
      }
    }
    
    window.addEventListener("load", initializeVisitorCounter);

    const questionBank = [
      { q: "Câu 1. Hệ điều hành nào được phát triển từ mã nguồn mở và ra mắt lần đầu năm 1991?", a: ["Windows", "Linux", "macOS", "Android"], c: 1 },
      { q: "Câu 2. Ngôn ngữ lập trình nào được sử dụng phổ biến nhất trong việc phát triển hệ điều hành?", a: ["C++", "Java", "Python", "Ruby"], c: 0 },
      { q: "Câu 3. Người dùng đăng ký sử dụng dịch vụ và được cấp một không gian lưu trữ trực tuyến gọi là?", a: ["Nhà lưu trữ", "Cầu kết nối", "Bát online", "Ổ đĩa trực tuyến"], c: 3 },
      { q: "Câu 4. Tải tệp lên ổ đĩa trực tuyến cho người dùng để…", a: ["Xóa các tệp và file trong máy tính mình đi", "Lưu trữ và sử dụng", "Mua bán thông tin lưu trữ của nhau", "Giải trí"], c: 1 },
      { q: "Câu 5. Những hành vi, hành động nào sau đây bị nghiêm cấm trong môi trường mạng?", a: ["Sử dụng mật mã để bảo vệ thông tin mạng.", "Thực hiện tấn công mạng, khủng bố mạng, gián điệp mạng, tội phạm mạng; gây sự cố, tấn công, xâm nhập, chiếm quyền điều khiển, làm sai lệch, gián đoạn, ngưng trệ, tê liệt hoặc phá hoại hệ thống thông tin quan trọng về an ninh quốc gia.", "Nghiên cứu, phân tích thông tin an ninh mạng.", "Tuyên truyền cách phòng chống tội phạm trong môi trường mạng."], c: 1 },
      { q: "Câu 6. Khi có một yêu cầu thanh toán hoặc chuyển tiền, cung cấp thông tin cá nhân ngay lập tức từ số điện thoại lạ chúng ta cần:", a: ["Dừng lại, không gửi", "Chuyển tiền ngay", "Cung cấp thông tin cá nhân", "Cung cấp số tài khoản ngân hàng, mã OTP"], c: 0 },
      { q: "Câu 7. Cập nhật dữ liệu là ...", a: ["Quá trình ghi (lưu trữ) thông tin (dữ liệu) trong một phương tiện lưu trữ.", "Quá trình thêm, xóa và chỉnh sửa dữ liệu.", "Quá trình tìm kiếm, sắp xếp hay lọc ra các dữ liệu theo những tiêu chí nào đó từ dữ liệu đã có.", "Quá trình phân tích, thống kê, tính toán từ dữ liệu đã có để được thông tin cần thiết."], c: 1 },
      { q: "Câu 8. Quá trình thêm, xóa và chỉnh sửa dữ liệu thường được gọi là ...", a: ["Lưu trữ dữ liệu.", "Cập nhật dữ liệu.", "Truy xuất dữ liệu.", "Khai thác thông tin."], c: 1 },
      { q: "Câu 9. Công việc nào dưới đây KHÔNG phải là công việc cập nhật dữ liệu?", a: ["Ghi chép (thêm) dữ liệu mới thu thập được.", "Xóa dữ liệu không còn ý nghĩa.", "Sửa chữa dữ liệu đã có để đảm bảo tính chính xác của dữ liệu.", "Tìm kiếm các dữ liệu thỏa mãn một tiêu chí xác định."], c: 3 },
      { q: "Câu 10. Phát biểu nào sai trong các phát biểu sau khi nói về khoá chính?", a: ["Một bảng có thể có nhiều khoá chính", "Mỗi bảng có ít nhất một khoá", "Xác định khoá phụ thuộc vào quan hệ logic của các dữ liệu chứ không phụ thuộc vào giá trị các dữ liệu", "Nên chọn khoá chính là khoá có ít thuộc tính nhất"], c: 0 },
      { q: "Câu 11. Giả sử một bảng có 2 trường Aid (số bảo hiểm) và TenNS (họ tên) thì nên chọn trường Aid làm khoá chính hơn vì.", a: ["Trường Aid là duy nhất, trong khi đó trường TenNS không phải là duy nhất", "Trường Aid là kiểu số, trong khi đó trường TenNS không phải là kiểu số", "Trường Aid đứng trước trường TenNS", "Trường Aid là trường ngắn hơn"], c: 0 },
      { q: "Câu 12. CSDL quan hệ là:", a: ["Là CSDL lưu trữ dữ liệu dưới dạng các bảng có quan hệ với nhau.", "Mô hình dữ liệu quan hệ nhiều bảng với nhau", "Mô hình hướng đối tượng trong bảng", "Mô hình cơ sở quan hệ CSDL."], c: 0 },
      { q: "Câu 13. Trong mô hình quan hệ, về mặt cấu trúc thì dữ liệu được thể hiện trong các:", a: ["Cột (Field).", "Hàng (Record).", "Bảng (Table).", "Báo cáo (Report)"], c: 2 },
      { q: "Câu 14. Em hãy điền vào chỗ trống: nếu tên trường có chứa dấu cách thì cần dùng dấu nào để đánh dấu bắt đầu và kết thúc tên trường?", a: ["( )", "‘ ’", "[ ]", "“ ”"], c: 2 },
      { q: "Câu 15. Trong mẫu câu truy vấn của SQL, mệnh đề SELECT dùng để làm gì?", a: ["Xác định điều kiện lọc dữ liệu", "Thêm dữ liệu vào bảng", "Xác định dữ liệu được lấy từ đâu", "Xác định thông tin ta muốn hiển thị"], c: 3 },
      { q: "Câu 16. Trong mẫu câu truy vấn của SQL, mệnh đề FROM dùng để làm gì?", a: ["Xác định điều kiện lọc dữ liệu", "Xác định dữ liệu được lấy từ đâu", "Xác định thông tin ta muốn hiển thị", "Xóa dữ liệu trong bảng"], c: 1 },
      { q: "Câu 17. Cho truy vấn SELECT [Họ và tên], [Giới tính], [Toán] FROM [HỌC SINH 11] WHERE [Giới tính] = “Nữ”, truy vấn cho biết thông tin nào?", a: ["Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh nữ", "Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh nam", "Đưa ra danh sách gồm: họ và tên, giới tính, điểm môn Toán của tất cả các học sinh", "Đưa ra danh sách gồm: họ và tên, giới tính của tất cả các học sinh"], c: 0 },
      { q: "Câu 18. Khi thực hiện thao tác lọc dữ liệu ta sử dụng:", a: ["Mẫu hỏi (Query)", "Biểu mẫu (Form)", "Liên kết bảng", "Báo cáo (report)"], c: 0 },
      { q: "Câu 19. Trong CSDL, việc thực hiện lọc dữ liệu theo yêu cầu nào đó gọi là gì?", a: ["Tạo biểu mẫu (tạo Form)", "Thiết kế bảng", "Truy vấn dữ liệu", "Tạo báo cáo"], c: 2 },

      { q: "Câu 5: Thụ thể phát hiện các biến dạng vật lý gây ra do các dạng năng lượng cơ học là", a: ["thụ thể cơ học.", "thụ thể điện từ.", "thụ thể đau.", "thụ thể nhiệt."], c: 0 },
      { q: "Câu 6: Tập tính ở động vật là", a: ["những biến đổi về hình thái trên cơ thể động vật để thích nghi với điều kiện môi trường sống.", "những hành động của động vật trả lời lại kích thích từ môi trường trong và ngoài, đảm bảo cho động vật tồn tại và phát triển.", "khả năng tiếp nhận và xử lý các thông tin từ môi trường thông qua các giác quan của động vật.", "các cử động tự phát của động vật nhằm tìm kiếm thức ăn và bạn tình mà không cần kích thích từ môi trường."], c: 1 },
      { q: "Câu 7: Tập tính ở động vật được hình thành chủ yếu nhằm mục đích", a: ["giúp động vật phát triển kích thước cơ thể nhanh chóng.", "đảm bảo cho sự tồn tại, thích nghi và duy trì nòi giống của loài.", "giúp động vật thay đổi cấu trúc di truyền để tiến hóa thành loài mới.", "chỉ nhằm mục đích giúp động vật lẩn trốn kẻ thù một cách thụ động."], c: 1 },
      { q: "Câu 8: Hoạt động nào dưới đây không được coi là một tập tính của động vật?", a: ["Chim sẻ làm tổ để chuẩn bị cho mùa sinh sản.", "Chó sủa khi thấy người lạ vào nhà.", "Một hòn đá lăn từ trên đỉnh núi xuống khe suối.", "Nhện giăng lưới để bẫy các loại côn trùng."], c: 2 },
      { q: "Câu 9: Khi một con chim bồ câu mới đầu rất sợ hãi trước một hình bù nhìn đặt trong ruộng lúa, nhưng sau một thời gian thấy hình bù nhìn không gây nguy hiểm, nó không còn bay đi khi nhìn thấy nữa. Đây là ví dụ của hình thức học tập nào?", a: ["Giải quyết vấn đề.", "Quen nhờn.", "In vết.", "Điều kiện hóa hành động."], c: 1 },
      { q: "Câu 10: Một con chuột sau vài lần nhấn nhầm một chiếc cần gạt và nhận được thức ăn, nó sẽ chủ động chạy đến nhấn cần gạt mỗi khi thấy đói. Đây là đặc điểm của hình thức học tập nào?", a: ["Điều kiện hóa đáp ứng.", "In vết.", "Điều kiện hóa hành động.", "Học ngầm."], c: 2 },
      { q: "Câu 11: Hình thức học tập mà trong đó con non đi theo vật chuyển động đầu tiên mà chúng nhìn thấy (thường là mẹ) trong một giai đoạn ngắn sau khi sinh được gọi là", a: ["học ngầm.", "in vết.", "học khôn.", "quen nhờn."], c: 1 },
      { q: "Câu 12: Trong các ví dụ sau đây, ví dụ nào minh họa cho tập tính bảo vệ lãnh thổ ở động vật?", a: ["Chim bói cá treo mình trên không trung để quan sát cá dưới nước.", "Sư tử đực đánh dấu khu vực sống bằng nước tiểu và tiếng gầm để xua đuổi những con đực khác.", "Nhện chăng lưới để bẫy các loại côn trùng nhỏ làm thức ăn.", "Gấu Bắc Cực tích trữ mỡ dưới lớp da dày để chuẩn bị cho kỳ ngủ đông."], c: 1 },
      { q: "Câu 13: Hành vi nào dưới đây là ví dụ điển hình của tập tính sinh sản?", a: ["Chim di cư từ phương Bắc về phương Nam khi mùa đông đến.", "Ong thợ nhảy vũ điệu vòng tròn để thông báo nguồn mật hoa cho cả đàn.", "Công đực xòe bộ lông đuôi rực rỡ và nhảy múa để thu hút chim cái vào mùa giao phối.", "Chó sủa vang khi có người lạ bước vào cổng nhà."], c: 2 },
      { q: "Câu 14: Ở loài kiến hoặc ong mật, các cá thể trong đàn phân chia nhiệm vụ rõ ràng (kiến chúa đẻ trứng, kiến thợ kiếm ăn và bảo vệ tổ). Đây là ví dụ minh họa cho dạng tập tính nào?", a: ["Tập tính học tập.", "Tập tính di cư.", "Tập tính xã hội.", "Tập tính bẩm sinh đơn lẻ."], c: 2 },
      { q: "Câu 15: Đặc điểm nào sau đây là đặc điểm đặc trưng nhất của tập tính bẩm sinh?", a: ["Được hình thành trong quá trình sống thông qua học tập và rút kinh nghiệm.", "Có thể thay đổi linh hoạt để thích nghi với điều kiện môi trường mới.", "Mang tính bản năng, di truyền từ bố mẹ và đặc trưng cho loài.", "Chỉ xuất hiện ở những động vật có hệ thần kinh phát triển cao."], c: 2 },
      { q: "Câu 16: Hành động nào dưới đây là ví dụ điển hình của tập tính học được?", a: ["Nhện giăng lưới để bẫy mồi.", "Chim én di cư về phương Nam khi mùa đông đến.", "Khỉ dùng hòn đá để đập vỡ vỏ hạt cứng lấy nhân.", "Ve sầu kêu vào mùa hè."], c: 2 },
      { q: "Câu 17: Khi nói về sự khác biệt giữa tập tính bẩm sinh và tập tính học được, phát biểu nào sau đây là sai?", a: ["Tập tính bẩm sinh thường bền vững và không thay đổi theo thời gian.", "Tập tính học được hình thành dựa trên việc thiết lập các mối liên hệ mới giữa các neuron.", "Động vật bậc thấp (như giun, côn trùng) thường có nhiều tập tính học được hơn tập tính bẩm sinh.", "Tập tính bẩm sinh là chuỗi các phản xạ không điều kiện."], c: 2 },
      { q: "Câu 18: Sinh trưởng là", a: ["quá trình biến đổi về chất lượng các cơ quan trong cơ thể.", "sự tăng lên về kích thước và khối lượng của cơ thể do sự tăng lên về số lượng và kích thước tế bào.", "quá trình hình thành các cơ quan và chức năng mới của cơ thể.", "sự thay đổi về hình thái và chức năng sinh lý của sinh vật qua các giai đoạn."], c: 1 },
      { q: "Câu 19: Phát triển ở sinh vật bao gồm những quá trình liên quan mật thiết nào sau đây?", a: ["Sinh trưởng, phân hóa tế bào và phát sinh hình thái cơ quan, cơ thể.", "Chỉ bao gồm sự tăng lên về kích thước cơ thể.", "Chỉ bao gồm quá trình phân chia tế bào.", "Quá trình già hóa và tử vong của tế bào."], c: 0 },
      { q: "Câu 20: Phát triển là", a: ["toàn bộ những biến đổi diễn ra trong chu kì sống của cá thể, bao gồm sự thay đổi về số lượng tế bào, cấu trúc, hình thái và trạng thái sinh lí.", "tăng số lượng tế bào, sự tổng hợp và tích lũy các chất làm tế bào tăng kích thước và khối lượng.", "quá trình các tế bào thay đổi cấu trúc và chuyên hóa chức năng.", "quá trình phát sinh hình thái cơ quan, cơ thể nhờ đó mà cơ quan, cơ thể có được hình dạng và chức năng sinh lí nhất định."], c: 0 },
      { q: "Câu 21: Ví dụ nào sau đây mô tả quá trình phát triển ở thực vật?", a: ["Rễ cây dài thêm 2cm.", "Thân cây to ra do sự hoạt động của tầng sinh vỏ.", "Cây cam bắt đầu ra hoa và kết quả.", "Lá cây tăng diện tích bề mặt để quang hợp."], c: 2 },
      { q: "Câu 22: Ví dụ nào sau đây là biểu hiện của sự sinh trưởng?", a: ["Cây lúa bắt đầu trổ bông.", "Con sâu bướm lột xác thành nhộng.", "Chiều cao của một bạn học sinh tăng thêm 5cm sau một năm.", "Hạt đậu nảy mầm thành cây con."], c: 2 },
      { q: "Câu 23: Dấu hiệu nào sau đây được xem là kết quả trực tiếp của quá trình sinh trưởng ở thực vật?", a: ["Sự hình thành mầm hoa và hạt phấn trong túi phấn.", "Sự tăng chiều dài của thân nhờ hoạt động của mô phân sinh đỉnh.", "Sự chuyển hóa từ trạng thái hạt đang ngủ nghỉ sang trạng thái nảy mầm.", "Sự xuất hiện của các tế bào chuyên hóa thực hiện chức năng dẫn truyền."], c: 1 },
      { q: "Câu 24: Quá trình một tế bào phôi ban đầu biến đổi thành các tế bào cơ, tế bào thần kinh, tế bào biểu mô được gọi là dấu hiệu nào của sự phát triển?", a: ["Tăng kích thước tế bào.", "Tăng số lượng tế bào qua nguyên phân.", "Phân hóa tế bào.", "Điều hòa chức năng sinh lí."], c: 2 },
      { q: "Câu 25: Trong vòng đời của bướm, việc sâu bướm lột xác để tăng kích thước và sau đó biến đổi thành nhộng thể hiện rõ nhất đặc trưng nào?", a: ["Chỉ có sự tăng về số lượng tế bào.", "Sự kết hợp chặt chẽ giữa sinh trưởng và phát triển.", "Quá trình phát triển không bao gồm sự phân hóa tế bào.", "Sự thay đổi kích thước nhưng không thay đổi về chức năng sinh lí."], c: 1 },
      { q: "Câu 26: Ví dụ nào sau đây mô tả quá trình phát triển ở thực vật?", a: ["Rễ cây dài thêm 5cm.", "Thân cây to ra do sự hoạt động của tầng sinh vỏ.", "Cây ổi bắt đầu ra hoa và kết quả.", "Lá cây tăng diện tích bề mặt để quang hợp."], c: 2 },
      { q: "Câu 27: Ở thực vật có hoa, hiện tượng một cây cà chua đạt đến số lượng lá nhất định (khoảng 7-9 lá) thì bắt đầu ra hoa là minh chứng rõ nhất cho nguyên lý nào dưới đây?", a: ["Sinh trưởng tối đa sẽ dẫn đến sự già hóa và chết đi của các cơ quan sinh dưỡng.", "Sự tích lũy về lượng (sinh trưởng) đến một mức độ nhất định sẽ dẫn đến sự biến đổi về chất (phát triển).", "Sự phát triển (ra hoa) hoàn toàn ức chế quá trình sinh trưởng (tăng thêm lá) của cây.", "Môi trường bên ngoài quyết định hoàn toàn thời điểm cây chuyển từ giai đoạn sinh dưỡng sang sinh sản."], c: 1 },
      { q: "Câu 28: Trong quá trình phát triển của sâu bướm, việc sâu ăn lá cây rất nhiều để tăng kích thước cơ thể nhanh chóng trước khi hóa nhộng thể hiện mối quan hệ gì?", a: ["Phát triển là điều kiện để quá trình sinh trưởng diễn ra liên tục.", "Sinh trưởng tích lũy vật chất chuẩn bị cho bước ngoặt của sự phát triển (biến thái).", "Quá trình biến thái từ sâu thành nhộng diễn ra độc lập với khối lượng cơ thể sâu.", "Sự phát triển thúc đẩy tốc độ sinh trưởng diễn ra nhanh hơn ở giai đoạn sau."], c: 1 },
      { q: "Câu 29: Một vận động viên thể hình tập luyện để tăng khối lượng cơ bắp (sinh trưởng) nhưng nếu sử dụng các loại hormone tăng trưởng quá liều có thể gây rối loạn chức năng sinh lý và khả năng sinh sản (phát triển). Hiện tượng này cho thấy", a: ["sinh trưởng quá mức luôn có lợi cho quá trình phát triển của cơ thể.", "sự sinh trưởng và phát triển cần có sự phối hợp nhịp nhàng, mất cân bằng sẽ gây hệ lụy xấu.", "chỉ có quá trình phát triển mới cần đến sự điều tiết của các hormone nội tiết.", "tốc độ sinh trưởng của các mô cơ không ảnh hưởng đến sự phát triển chung của cơ thể."], c: 1 },
      { q: "Câu 30: Ở người, nếu tuyến yên tiết ra quá ít hormone sinh trưởng (GH) ở giai đoạn trẻ em sẽ dẫn đến hiện tượng người lùn nhưng trí tuệ vẫn phát triển bình thường. Ví dụ này cho phép ta rút ra kết luận gì về mối quan hệ giữa sinh trưởng và phát triển?", a: ["Sinh trưởng và phát triển hoàn toàn là một quá trình thống nhất, không thể tách rời.", "Tốc độ sinh trưởng của các cơ quan khác nhau trong cơ thể luôn diễn ra đồng bộ.", "Một số mặt của sự phát triển (như trí tuệ) có thể diễn ra tương đối độc lập với sự sinh trưởng về kích thước hình thái.", "Sự phát triển trí tuệ là kết quả trực tiếp của sự tăng trưởng về kích thước bộ não."], c: 2 },
      { q: "Câu 31: Trong nghề trồng hoa cúc, vào mùa đông (thời điểm ngày ngắn), người trồng hoa thường thắp đèn điện vào ban đêm cho cây. Việc làm này nhằm mục đích kéo dài quá trình sinh trưởng sinh dưỡng (tăng chiều cao, số lá) và trì hoãn quá trình phát triển (ra hoa). Phân tích nào sau đây là sai về mối quan hệ giữa sinh trưởng và phát triển trong kỹ thuật này?", a: ["Thắp đèn giúp cây tiếp tục tích lũy sinh khối, tạo tiền đề vật chất tốt hơn cho việc ra hoa to và đẹp sau này.", "Kỹ thuật này lợi dụng việc điều tiết ánh sáng để làm chậm sự chuyển hóa về chất (phát triển) của cây.", "Việc kìm hãm sự phát triển (ra hoa) sẽ trực tiếp thúc đẩy quá trình sinh trưởng (tăng chiều cao) diễn ra mạnh mẽ hơn.", "Khi ngừng thắp đèn, cây sẽ ngay lập tức ra hoa mà không cần trải qua giai đoạn sinh trưởng bổ sung nào khác."], c: 3 },
      { q: "Câu 32: Một cây gỗ sống ở vùng có khí hậu khắc nghiệt, vào những năm hạn hán kéo dài, người ta quan sát thấy cây thường có hiện tượng: vòng gỗ năm đó rất hẹp (sinh trưởng chậm) nhưng cây lại tập trung ra hoa, kết quả rất nhiều (phát triển mạnh). Hiện tượng này phản ánh điều gì về mối quan hệ giữa sinh trưởng và phát triển?", a: ["Sinh trưởng và phát triển luôn tỉ lệ thuận với nhau; khi sinh trưởng chậm thì phát triển cũng sẽ chậm theo.", "Trong điều kiện bất lợi, cây ưu tiên nguồn năng lượng hạn chế cho quá trình phát triển (duy trì nòi giống) thay vì sinh trưởng (tăng kích thước).", "Sự phát triển mạnh (ra hoa, kết quả) là nguyên nhân trực tiếp gây ra tình trạng hạn hán và làm cây sinh trưởng kém.", "Cây gỗ này đã bị rối loạn sinh lý, khiến quá trình sinh trưởng và phát triển không còn mối liên hệ với nhau."], c: 1 },

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function normalizeQuestions(source) {
      return source.map((item) => {
        if (item.type === "short") {
          return {
            q: item.q,
            img: item.img || "",
            type: "short",
            answers: Array.isArray(item.answer) ? item.answer : [item.answer]
          };
        }
        return {
          q: item.q,
          img: item.img || "",
          type: "multiple",
          options: item.a.map((text, idx) => ({
            text,
            correct: (Array.isArray(item.c) ? item.c : [item.c]).includes(idx)
          }))
        };
      });
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = CONFIG.timePerQuestion;
      elements.time.textContent = formatTime(timeLeft);

      timer = setInterval(() => {
        timeLeft -= 1;
        elements.time.textContent = formatTime(timeLeft);
        if (timeLeft <= 0) {
          clearInterval(timer);
          submitAnswer(true);
        }
      }, 1000);
    }

    function updateProgress() {
      const percent = (index / questions.length) * 100;
      elements.progress.style.width = `${percent}%`;
      elements.position.textContent = Math.min(index + 1, questions.length);
      elements.progressText.textContent = `Đang ở câu ${Math.min(index + 1, questions.length)}/${questions.length}`;
    }

    function loadQuestion() {
      const current = questions[index];
      updateProgress();
      startTimer();
      elements.container.classList.add("fade-in");
      setTimeout(() => {
        elements.container.classList.remove("fade-in");
      }, 500);

      elements.question.textContent = current.q;
      if (current.img) {
        elements.questionImage.src = current.img;
        elements.questionImage.classList.remove("hidden");
      } else {
        elements.questionImage.classList.add("hidden");
        elements.questionImage.removeAttribute("src");
      }
      
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      selectedAnswerIndexes = new Set();
      submitted = false;
      elements.submitBtn.disabled = false;
      elements.shortAnswerInput.removeEventListener("keypress", handleShortAnswerEnter);

      if (current.type === "short") {
        elements.answers.innerHTML = "";
        elements.answers.classList.add("hidden");
        elements.shortAnswerInput.classList.remove("hidden");
        elements.shortAnswerInput.disabled = false;
        elements.shortAnswerInput.value = "";
        elements.shortAnswerInput.focus();
        elements.shortAnswerInput.addEventListener("keypress", handleShortAnswerEnter);
      } else {
        elements.shortAnswerInput.classList.add("hidden");
        elements.answers.classList.remove("hidden");
        elements.answers.innerHTML = "";
        current.options.forEach((option, optionIndex) => {
          const btn = document.createElement("button");
          btn.textContent = option.text;
          btn.className = "answer";
          btn.dataset.correct = option.correct ? "1" : "0";
          btn.dataset.optionIndex = String(optionIndex);
          btn.dataset.answer = option.text;
          btn.addEventListener("click", () => toggleAnswer(optionIndex, btn));
          elements.answers.appendChild(btn);
        });
      }
    }

    function playSound(audioEl) {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }

    function setMusicButtonState() {
      elements.musicBtn.textContent = elements.bgMusic.paused ? "🎵 Bật nhạc" : "🔇 Tắt nhạc";
    }

    async function toggleBgm() {
      if (!elements.bgMusic.paused) {
        elements.bgMusic.pause();
        setMusicButtonState();
        return;
      }

      elements.bgMusic.volume = 0.45;
      await elements.bgMusic.play();
      setMusicButtonState();
    }

    function wrongEffect(button) {
      button.classList.add("wrong");
      elements.container.classList.add("shake", "flash");
      playSound(elements.soundWrong);
      setTimeout(() => {
        elements.container.classList.remove("shake", "flash");
      }, 450);
    }

    function toggleAnswer(optionIndex, button) {
      if (submitted) {
        return;
      }

      if (activeQuizMode === "reading") {
        selectedAnswerIndexes.clear();
        Array.from(elements.answers.children).forEach((answerButton) => {
          answerButton.classList.remove("selected");
        });
        selectedAnswerIndexes.add(optionIndex);
        button.classList.add("selected");
        return;
      }

      if (selectedAnswerIndexes.has(optionIndex)) {
        selectedAnswerIndexes.delete(optionIndex);
        button.classList.remove("selected");
      } else {
        selectedAnswerIndexes.add(optionIndex);
        button.classList.add("selected");
      }
    }

    function submitAnswer(isTimeout = false) {
      if (submitted) {
        return;
      }

      const current = questions[index];

      if (current.type === "short") {
        // Handle short answer
        const userAnswer = elements.shortAnswerInput.value.trim().toLowerCase();
        
        if (!isTimeout && !userAnswer) {
          alert("Nhập câu trả lời rồi bấm nộp nhé 😌");
          return;
        }

        clearInterval(timer);
        submitted = true;
        elements.submitBtn.disabled = true;
        elements.shortAnswerInput.disabled = true;

        const correctAnswers = current.answers.map((ans) => ans.toLowerCase());
        const isCorrect = correctAnswers.includes(userAnswer);

        if (isCorrect) {
          score += 1;
          elements.score.textContent = score;
          playSound(elements.soundCorrect);
          elements.answerBox.textContent = `✅ Chính xác! Bạn nhập: "${userAnswer}"`;
          elements.answerBox.classList.add("show");
          elements.answerBox.style.background = "#0f8a0f";
        } else {
          playSound(elements.soundWrong);
          elements.container.classList.add("shake", "flash");
          setTimeout(() => {
            elements.container.classList.remove("shake", "flash");
          }, 450);
          const correctAnswer = current.answers.join(" hoặc ");
          elements.answerBox.textContent = `❌ Sai rồi! Đáp án đúng: ${correctAnswer}`;
          elements.answerBox.classList.add("show");
          elements.answerBox.style.background = "#8a0f0f";
          
          wrongAnswers.push({
            question: current.q,
            selected: userAnswer || "(không nhập gì)",
            correct: correctAnswer
          });
        }
      } else {
        // Handle multiple choice
        if (!isTimeout && selectedAnswerIndexes.size === 0) {
          alert("Chọn ít nhất 1 đáp án rồi bấm nộp nhé 😌");
          return;
        }

        clearInterval(timer);
        submitted = true;
        elements.submitBtn.disabled = true;

        const buttons = Array.from(elements.answers.children);
        buttons.forEach((btn) => {
          btn.disabled = true;
        });

        const correctIndexes = current.options
          .map((option, optionIndex) => (option.correct ? optionIndex : -1))
          .filter((value) => value >= 0);
        const allCorrectChosen =
          selectedAnswerIndexes.size === correctIndexes.length &&
          correctIndexes.every((correctIndex) => selectedAnswerIndexes.has(correctIndex));

        if (allCorrectChosen) {
          correctIndexes.forEach((correctIndex) => {
            const btn = buttons.find((item) => Number(item.dataset.optionIndex) === correctIndex);
            if (btn) {
              btn.classList.add("correct");
            }
          });
          score += 1;
          elements.score.textContent = score;
          playSound(elements.soundCorrect);
        } else {
          const selectedWrongButton = buttons.find((btn) => {
            const optionIndex = Number(btn.dataset.optionIndex);
            return selectedAnswerIndexes.has(optionIndex) && !correctIndexes.includes(optionIndex);
          });
          if (selectedWrongButton) {
            wrongEffect(selectedWrongButton);
          } else {
            elements.container.classList.add("shake", "flash");
            playSound(elements.soundWrong);
            setTimeout(() => {
              elements.container.classList.remove("shake", "flash");
            }, 450);
          }

          buttons.forEach((btn) => {
            const optionIndex = Number(btn.dataset.optionIndex);
            if (correctIndexes.includes(optionIndex)) {
              btn.classList.add("correct");
            } else if (selectedAnswerIndexes.has(optionIndex)) {
              btn.classList.add("wrong");
            }
          });

          const selectedAnswer = Array.from(selectedAnswerIndexes)
            .sort((first, second) => first - second)
            .map((answerIndex) => current.options[answerIndex]?.text)
            .filter(Boolean)
            .join(" | ") || "(không chọn đáp án nào)";
          const correctAnswer = correctIndexes
            .map((correctIndex) => current.options[correctIndex]?.text)
            .filter(Boolean)
            .join(" | ");

          wrongAnswers.push({
            question: current.q,
            selected: selectedAnswer,
            correct: correctAnswer
          });

          elements.answerBox.textContent = `Đáp án đúng là: ${correctAnswer}`;
          elements.answerBox.classList.add("show");
        }
      }

      setTimeout(nextQuestion, 1500);
    }

    function showStatistics() {
      const total = questions.length;
      const correctCount = score;
      const wrongCount = total - score;
      const percent = Math.round((correctCount / total) * 100);
      const topWrong = stats
        .map((item, idx) => ({ index: idx + 1, ...item }))
        .filter((item) => item.wrong > 0)
        .sort((a, b) => b.wrong - a.wrong)
        .slice(0, 3);

      elements.statsBox.classList.remove("hidden");
      elements.statsBox.innerHTML = `
        <h3>📊 Thống kê bài làm</h3>
        <p>✅ Đúng: ${correctCount}</p>
        <p>❌ Sai: ${wrongCount}</p>
        <p>📈 Tỉ lệ chính xác: ${percent}%</p>
        <div class="progress-stat"><div class="progress-fill" style="width:${percent}%"></div></div>
        <h4>🔥 Câu sai nhiều nhất:</h4>
      `;

      if (!topWrong.length) {
        const p = document.createElement("p");
        p.textContent = "Không có câu sai 🎉";
        elements.statsBox.appendChild(p);
        return;
      }

      topWrong.forEach((item) => {
        const p = document.createElement("p");
        p.textContent = `Câu ${item.index} - Sai ${item.wrong} lần`;
        elements.statsBox.appendChild(p);
      });
    }

    function showWrongAnswers() {
      elements.reviewPanel.classList.remove("hidden");
      elements.reviewPanel.innerHTML = "<h3>📋 Các câu bạn làm sai</h3>";

      wrongAnswers.forEach((item, order) => {
        const block = document.createElement("div");
        block.className = "review-block";
        block.innerHTML = `
          <p><strong>Câu ${order + 1}:</strong> ${item.question}</p>
          <p style="color:#ef4444;">Bạn chọn: ${item.selected}</p>
          <p style="color:#22c55e;">Đáp án đúng: ${item.correct}</p>
        `;
        elements.reviewPanel.appendChild(block);
      });
    }

    function nextQuestion() {
      index += 1;
      if (index < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function saveScore() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      data.push({ name: player, score, total: questions.length, time: Date.now() });
      data.sort((first, second) => {
        if (second.score !== first.score) {
          return second.score - first.score;
        }
        return first.time - second.time;
      });
      const top5 = data.slice(0, 5);
      localStorage.setItem(CONFIG.leaderboardKey, JSON.stringify(top5));
    }

    function showRank() {
      const data = JSON.parse(localStorage.getItem(CONFIG.leaderboardKey) || "[]");
      elements.rank.innerHTML = "";
      data.forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = `${entry.name} - ${entry.score}/${questions.length}`;
        elements.rank.appendChild(li);
      });
      if (!data.length) {
        const li = document.createElement("li");
        li.textContent = "Chưa có dữ liệu";
        elements.rank.appendChild(li);
      }
    }

    function finishQuiz() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.remove("hidden");
      elements.final.textContent = `${player} · ${selectedSubjectLabel} · ${score}/${questions.length} điểm`;
      elements.progress.style.width = "100%";

      if (score === questions.length) {
        confetti({ particleCount: 220, spread: 110, origin: { y: 0.65 } });
      }

      saveScore();
      showRank();
      showStatistics();

      if (wrongAnswers.length > 0) {
        elements.reviewBtn.classList.remove("hidden");
      } else {
        elements.reviewBtn.classList.add("hidden");
      }
    }

    function restart() {
      clearInterval(timer);
      elements.quiz.classList.add("hidden");
      elements.result.classList.add("hidden");
      elements.start.classList.remove("hidden");
      elements.score.textContent = "0";
      elements.progress.style.width = "0%";
      elements.time.textContent = formatTime(CONFIG.timePerQuestion);
      elements.position.textContent = "1";
      elements.answerBox.classList.remove("show");
      elements.answerBox.textContent = "";
      elements.answerBox.style.background = "#1e293b";
      elements.reviewBtn.classList.add("hidden");
      elements.reviewPanel.classList.add("hidden");
      elements.reviewPanel.innerHTML = "";
      elements.statsBox.classList.add("hidden");
      elements.statsBox.innerHTML = "";
      elements.shortAnswerInput.classList.add("hidden");
      elements.shortAnswerInput.value = "";
      elements.shortAnswerInput.disabled = false;
      elements.shortAnswerInput.removeEventListener("keypress", handleShortAnswerEnter);
      activeQuizMode = "default";
      activeReading = null;
      applyQuizLayout();
      elements.name.focus();
    }

    elements.startBtn.addEventListener("click", startQuiz);
    elements.restartBtn.addEventListener("click", restart);
    elements.reviewBtn.addEventListener("click", showWrongAnswers);
    elements.submitBtn.addEventListener("click", () => submitAnswer(false));
    elements.musicBtn.addEventListener("click", () => {
      toggleBgm().catch(() => {
        elements.bgMusic.pause();
        setMusicButtonState();
      });
    });
    elements.name.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startQuiz();
      }
    });

    setMusicButtonState();
  </script>
</body>
</html>
